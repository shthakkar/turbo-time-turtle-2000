<!DOCTYPE html>
<html>
<head>
<title>Turbo Time Turtle 2000</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { box-sizing: border-box; touch-action: none; }
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; overflow: hidden; }
  #game-wrapper { position: relative; }
  canvas { display: block; border: 2px solid #333; max-width: 100%; }
  /* Touch controls — hidden on desktop, shown on mobile */
  #touch-controls { display: none; width: 100%; max-width: 800px; background: #111; padding: 8px 16px; }
  @media (pointer: coarse) {
    #touch-controls { display: flex; justify-content: space-between; align-items: center; }
  }
  /* D-pad */
  #dpad { display: grid; grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px 44px; gap: 4px; }
  .dpad-btn { background: #222; border: 2px solid #444; border-radius: 8px; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .dpad-btn:active { background: #444; }
  #dpad-empty { background: transparent; border: none; }
  /* E / Action button */
  #btn-e { width: 80px; height: 80px; border-radius: 50%; background: #1a3a1a; border: 3px solid #00e676; color: #00e676; font-size: 22px; font-weight: bold; font-family: monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; }
  #btn-e:active { background: #2a5a2a; }
</style>
</head>
<body>
<!-- wrap canvas for layout -->
<div id="game-wrapper">
  <canvas id="game" width="800" height="600"></canvas>
</div>

<!-- Mobile touch controls -->
<div id="touch-controls">
  <div id="dpad">
    <div></div>
    <div class="dpad-btn" id="btn-up">▲</div>
    <div></div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div id="dpad-empty"></div>
    <div class="dpad-btn" id="btn-right">▶</div>
    <div></div>
    <div class="dpad-btn" id="btn-down">▼</div>
    <div></div>
  </div>
  <div id="btn-e">E</div>
</div>

<script>
// Scale canvas to fit viewport while preserving 800x600 aspect ratio
function resizeCanvas() {
  const wrapper = document.getElementById('game-wrapper');
  const controls = document.getElementById('touch-controls');
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  const controlsH = isMobile ? (controls.offsetHeight || 120) : 0;
  const availW = window.innerWidth;
  const availH = window.innerHeight - controlsH;
  const scale = Math.min(availW / 800, availH / 600);
  const canvas = document.getElementById('game');
  canvas.style.width  = Math.floor(800 * scale) + 'px';
  canvas.style.height = Math.floor(600 * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// Touch controls → keys[] injection
function touchKey(key, down) { keys[key] = down; }

function bindTouch(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); touchKey(key, true);  }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  // Also support mouse for dev testing
  el.addEventListener('mousedown', () => touchKey(key, true));
  el.addEventListener('mouseup',   () => touchKey(key, false));
  el.addEventListener('mouseleave',() => touchKey(key, false));
}

bindTouch('btn-up',    'ArrowUp');
bindTouch('btn-down',  'ArrowDown');
bindTouch('btn-left',  'ArrowLeft');
bindTouch('btn-right', 'ArrowRight');
bindTouch('btn-e',     'e');

// Tap anywhere on canvas to advance dialogue (mobile convenience)
document.getElementById('game').addEventListener('touchend', e => {
  e.preventDefault();
  if (dialogueActive) advanceDialogue();
}, { passive: false });

// ── SHARED ────────────────────────────────────────────────────
let scene = 'house';
let dialogueActive = false, dialogueLines = [], dialoguePage = 0, dialogueCallback = null;
let showInteractHint = false, interactHintText = 'Press E to interact';
let inventory = [];
let eKeyWasDown = false;
const eric = { x: 400, y: 430, w: 24, h: 24, speed: 3 };

// ── SCENE 1 ───────────────────────────────────────────────────
const house  = { x: 580, y: 80, w: 140, h: 120 };
const tree1  = { x: 100, y: 100, r: 30 };
const tree2  = { x: 680, y: 350, r: 25 };
const turtle = { x: 300, y: 200, w: 40, h: 36 };
let turtleFlashTimer = 0, turtleSpawned = false, notePickedUp = false;

// ── SCENE 2 ───────────────────────────────────────────────────
let cockpitPhase = 'explore';
let warpTimer = 0;
const keypad = { x: 160, y: 260, w: 100, h: 130 };
const goBtn  = { x: 560, y: 300, w: 90,  h: 60  };

// ── SCENE 3 ───────────────────────────────────────────────────
let cityPhase = 'arrive';
let cityArriveTimer = 0, snakeTimer = 0, ericStunTimer = 0;
const lordTime3 = { x: 700, y: 280, w: 28, h: 36 };
const snake     = { x: 700, y: 280, w: 56, h: 22, speed: 1.5 };
const extractor = { x: 660, y: 480, w: 26, h: 26, pickedUp: false };
const cityBuildings = [
  {x:40,y:50,w:110,h:90},{x:240,y:50,w:90,h:110},{x:480,y:50,w:130,h:80},{x:680,y:50,w:100,h:90},
  {x:40,y:460,w:100,h:100},{x:260,y:470,w:110,h:90},{x:480,y:460,w:90,h:100}
];
const flyingCars = [
  {x:-80, y:170,w:60,h:22,speed: 2.4,color:'#e53935'},
  {x:300, y:210,w:52,h:18,speed: 3.0,color:'#1e88e5'},
  {x:820, y:140,w:58,h:20,speed:-2.2,color:'#fdd835'},
  {x:100, y:390,w:55,h:20,speed: 2.8,color:'#43a047'},
  {x:820, y:340,w:60,h:22,speed:-3.2,color:'#ab47bc'},
  {x:-120,y:440,w:50,h:18,speed: 2.0,color:'#ff7043'},
];

// ── SCENE 4 ───────────────────────────────────────────────────
let sidewalkPhase = 'explore';
let tripTimer = 0, warehouseMarkerVisible = false;
const paper   = { x: 580, y: 390, w: 20, h: 16, found: false };
const puddle  = { x: 310, y: 430, w: 70, h: 28 };
const sidewalkBuildings = [
  {x:0,  y:50, w:120,h:200},{x:0,  y:290,w:120,h:200},
  {x:660,y:50, w:140,h:200},{x:660,y:290,w:140,h:200},
  {x:180,y:50, w:100,h:80}, {x:380,y:50, w:120,h:90},{x:580,y:50,w:80,h:70},
];
const warehouseSign = { x: 320, y: 80, w: 160, h: 60 };

// ── SCENE 5 ───────────────────────────────────────────────────
let whPhase = 'explore';
let whTimer = 0, struggleBar = 0, dustAlpha = 0;
let ltW = { x: -40, y: 300, w: 28, h: 36, speed: 1.2 };
const whKey   = { x: 580, y: 460, w: 22, h: 14, found: false };
const benCage = { x: 640, y: 220, w: 80, h: 80 };
const ben     = { x: 660, y: 244, w: 20, h: 28 };
const whCrates = [
  {x:160,y:100,w:60,h:60},{x:280,y:100,w:50,h:50},{x:420,y:100,w:60,h:60},{x:680,y:50,w:100,h:90},
  {x:160,y:220,w:55,h:55},{x:320,y:260,w:60,h:50},
  {x:160,y:380,w:60,h:60},{x:280,y:420,w:55,h:55},{x:450,y:400,w:60,h:60},
  {x:540,y:140,w:55,h:55},
];
const keyCrateIdx = 9;

// ── SCENE 6 ───────────────────────────────────────────────────
let escPhase = 'run'; // run | warping | arrived | credits
let escTimer = 0;
let warpBackTimer = 0;
let creditsY = 620;
let benX = 60, benY = 320; // Ben follows Eric in escape
const escTurtle = { x: 680, y: 280, w: 40, h: 36 };
const creditLines = [
  '', '', '',
  '~ TURBO TIME TURTLE 2000 ~',
  'Chapter 1',
  '',
  'A story by Samarth Thakkar',
  '',
  '',
  'ERIC ............... The Hero',
  'BEN ................ The Dad',
  'LORD TIME .......... The Villain',
  '',
  '',
  'The Turbo Time Turtle 2000',
  '  — for always being on time',
  '',
  '',
  'Thank you for playing!',
  '',
  '',
  '[ continue for epilogue ]',
];

// ── EPILOGUE ──────────────────────────────────────────────────
let epPhase = 'regen';   // regen | eyeopen | reveal | end
let epTimer = 0;
let eyeOpenAmt = 0;      // 0 = closed, 1 = fully open
let epTextAlpha = 0;
let regenCount = 0;

// ── HELPERS ───────────────────────────────────────────────────
function showDialogue(lines, cb) {
  dialogueLines = lines; dialoguePage = 0;
  dialogueActive = true; dialogueCallback = cb || null;
}
function advanceDialogue() {
  dialoguePage++;
  if (dialoguePage >= dialogueLines.length) {
    dialogueActive = false;
    const cb = dialogueCallback; dialogueCallback = null;
    if (cb) cb();
  }
}
function near(obj, bx, by, dist) {
  return Math.hypot(obj.x+obj.w/2-bx, obj.y+obj.h/2-by) < dist;
}
function nearRect(a, b, dist) { return near(a, b.x+b.w/2, b.y+b.h/2, dist); }
function collides(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function moveEric(obstacles) {
  if (ericStunTimer > 0) { ericStunTimer--; return; }
  let dx=0, dy=0;
  if (keys['ArrowLeft'] ||keys['a']||keys['A']) dx=-eric.speed;
  if (keys['ArrowRight']||keys['d']||keys['D']) dx= eric.speed;
  if (keys['ArrowUp']   ||keys['w']||keys['W']) dy=-eric.speed;
  if (keys['ArrowDown'] ||keys['s']||keys['S']) dy= eric.speed;
  let nx=Math.max(0,Math.min(800-eric.w,eric.x+dx));
  let ny=Math.max(36,Math.min(600-eric.h,eric.y+dy));
  for (const o of obstacles) { if (collides(nx,eric.y,eric.w,eric.h,o.x,o.y,o.w,o.h)) nx=eric.x; }
  for (const o of obstacles) { if (collides(eric.x,ny,eric.w,eric.h,o.x,o.y,o.w,o.h)) ny=eric.y; }
  eric.x=nx; eric.y=ny;
}

// ── UPDATE ────────────────────────────────────────────────────
function update() {
  if (dialogueActive) {
    const eDown = keys['e']||keys['E']||keys[' '];
    if (eDown && !eKeyWasDown) advanceDialogue();
    eKeyWasDown = eDown; return;
  }
  eKeyWasDown = false;
  if (scene==='house')     updateHouse();
  if (scene==='cockpit')   updateCockpit();
  if (scene==='warp')      updateWarp();
  if (scene==='city')      updateCity();
  if (scene==='sidewalk')  updateSidewalk();
  if (scene==='warehouse') updateWarehouse();
  if (scene==='escape')    updateEscape();
  if (scene==='home')      updateHome();
  if (scene==='epilogue')  updateEpilogue();
}

// S1
function updateHouse() {
  moveEric([house]);
  if (!turtleSpawned) { turtleFlashTimer++; if (turtleFlashTimer>180) turtleSpawned=true; }
  showInteractHint = false;
  if (turtleSpawned && nearRect(eric, turtle, 60)) {
    showInteractHint=true; interactHintText='Press E to interact';
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) {
      eKeyWasDown=true;
      if (!notePickedUp) {
        showDialogue([
          "Eric finds a note tied to the turtle...",
          "Note: 'Son, I've been taken to the year 3099.",
          "Lord Time has me captive in a warehouse.",
          "Use the Turbo Time Turtle 2000 to find me.",
          "                              - Dad'",
          "A second note falls out: 'I'm in 3099!'"
        ], ()=>{ notePickedUp=true; inventory.push("Dad's Note"); });
      } else {
        showDialogue(["The turtle nods. Climb aboard — to 3099!"],
          ()=>{ scene='cockpit'; cockpitPhase='explore'; eric.x=400; eric.y=450; });
      }
    }
  }
}

// S2
function updateCockpit() {
  moveEric([]);
  showInteractHint=false;
  if (cockpitPhase==='explore' && nearRect(eric,keypad,70)) {
    showInteractHint=true; interactHintText='Press E to use keypad';
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) {
      eKeyWasDown=true;
      showDialogue(["Eric types: 3 0 9 9","Display flickers — destination locked."],
        ()=>{ cockpitPhase='typed'; });
    }
  }
  if (cockpitPhase==='typed' && nearRect(eric,goBtn,70)) {
    showInteractHint=true; interactHintText='Press E to launch';
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) {
      eKeyWasDown=true;
      showDialogue(["Eric slams GO!","TURBO TIME TURTLE 2000 — ACTIVATING!","Hold on..."],
        ()=>{ scene='warp'; warpTimer=0; });
    }
  }
}

function updateWarp() {
  warpTimer++;
  if (warpTimer>180) { enterCity(); }
}
function enterCity() {
  scene='city'; cityPhase='arrive'; cityArriveTimer=0; snakeTimer=0;
  extractor.pickedUp=false; ericStunTimer=0;
  eric.x=100; eric.y=300;
  lordTime3.x=700; lordTime3.y=280; snake.x=700; snake.y=280;
}

// S3
function updateCity() {
  for (const car of flyingCars) {
    car.x+=car.speed;
    if (car.speed>0&&car.x>860) car.x=-80;
    if (car.speed<0&&car.x<-80) car.x=860;
  }
  if (cityPhase==='arrive') {
    cityArriveTimer++; moveEric(cityBuildings);
    if (cityArriveTimer===100) {
      showDialogue([
        "Eric lands in 3099. The city is surreal.",
        "Neon towers. Flying cars. Chaos everywhere.",
        "A dark figure steps from the shadows..."
      ], ()=>{ cityPhase='cutscene'; });
    }
  }
  if (cityPhase==='cutscene') {
    showDialogue([
      "LORD TIME: 'So... you came all this way, boy.'",
      "LORD TIME: 'Your father belongs to me now.'",
      "LORD TIME: 'And so do YOU!'",
      "Lord Time shoves Eric backward!",
      "LORD TIME: 'Witness my true form... SSSSS!'",
      "Lord Time twists into a GIANT SNAKE!"
    ], ()=>{ cityPhase='snake'; snakeTimer=0; snake.x=400; snake.y=200; });
  }
  if (cityPhase==='snake') {
    moveEric(cityBuildings); snakeTimer++;
    const sx=snake.x+snake.w/2, sy=snake.y+snake.h/2;
    const ex=eric.x+eric.w/2,   ey=eric.y+eric.h/2;
    const d=Math.hypot(ex-sx,ey-sy);
    if (d>2) { snake.x+=((ex-sx)/d)*snake.speed; snake.y+=((ey-sy)/d)*snake.speed; }
    for (const car of flyingCars) {
      if (collides(eric.x,eric.y,eric.w,eric.h,car.x,car.y,car.w,car.h)) {
        ericStunTimer=40; eric.x=Math.max(0,eric.x-30*Math.sign(car.speed));
      }
    }
    if (collides(eric.x,eric.y,eric.w,eric.h,snake.x,snake.y,snake.w,snake.h)) {
      ericStunTimer=30; eric.x=Math.max(0,eric.x-40);
    }
    showInteractHint=false;
    if (!extractor.pickedUp && nearRect(eric,extractor,50)) {
      showInteractHint=true; interactHintText='Press E to grab Venom Extractor';
      const eDown=keys['e']||keys['E'];
      if (eDown&&!eKeyWasDown) {
        eKeyWasDown=true; extractor.pickedUp=true; inventory.push('Venom Extractor');
        showDialogue(["Eric grabs the Venom Extractor!","Now use it on the snake!"]);
      }
    }
    if (extractor.pickedUp && nearRect(eric,snake,70)) {
      showInteractHint=true; interactHintText='Press E to use Venom Extractor';
      const eDown=keys['e']||keys['E'];
      if (eDown&&!eKeyWasDown) {
        eKeyWasDown=true;
        inventory=inventory.filter(i=>i!=='Venom Extractor');
        showDialogue([
          "Eric jabs the extractor into the snake!",
          "The snake SHRIEKS and writhes!",
          "Lord Time collapses — unconscious!",
          "Eric: 'Now's my chance — run EAST!'"
        ], ()=>{ cityPhase='conquered'; });
      }
    }
  }
  if (cityPhase==='conquered') {
    moveEric(cityBuildings); showInteractHint=false;
    if (eric.x>740) {
      showDialogue([
        "Eric slips east through a narrow alley!",
        "He steps onto a quiet sidewalk..."
      ], enterSidewalk);
    }
  }
}

// S4
function enterSidewalk() {
  scene='sidewalk'; sidewalkPhase='explore'; tripTimer=0;
  warehouseMarkerVisible=false; paper.found=false; ericStunTimer=0;
  eric.x=120; eric.y=320;
}
function updateSidewalk() {
  if (sidewalkPhase==='tripped') {
    tripTimer++;
    if (tripTimer===1) {
      showDialogue([
        "Eric trips on a crack in the sidewalk!",
        "The paper flies out of his hand...",
        "It lands right in the puddle — SPLAT!"
      ], ()=>{
        sidewalkPhase='revealed';
        showDialogue([
          "The water soaks the paper...",
          "Invisible ink starts to appear!",
          "'Your father is in the WAREHOUSE.'",
          "'East end of the block. Hurry.'"
        ], ()=>{
          sidewalkPhase='warehouse_shown'; warehouseMarkerVisible=true;
          inventory=inventory.filter(i=>i!=='Blank Paper');
          inventory.push('Warehouse Clue');
        });
      });
    }
    return;
  }
  moveEric(sidewalkBuildings); showInteractHint=false;
  if (paper.found && sidewalkPhase==='paper_found') {
    if (collides(eric.x,eric.y,eric.w,eric.h,puddle.x,puddle.y,puddle.w,puddle.h)) {
      sidewalkPhase='tripped'; tripTimer=0; return;
    }
  }
  if (!paper.found && sidewalkPhase==='explore' && nearRect(eric,paper,45)) {
    showInteractHint=true; interactHintText='Press E to pick up paper';
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) {
      eKeyWasDown=true; paper.found=true; inventory.push('Blank Paper');
      showDialogue([
        "Eric picks up a scrap of paper.",
        "Eric: 'It's completely blank... that's weird.'",
        "Eric: 'Why would someone leave a blank piece of paper?'",
        "Eric pockets it and keeps walking..."
      ], ()=>{ sidewalkPhase='paper_found'; });
    }
  }
  if (sidewalkPhase==='warehouse_shown' && nearRect(eric,warehouseSign,80)) {
    showInteractHint=true; interactHintText='Press E to enter warehouse';
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) {
      eKeyWasDown=true;
      showDialogue([
        "The warehouse looms at the end of the block.",
        "Eric: 'Dad has to be in there. Let's go.'"
      ], enterWarehouse);
    }
  }
}

// S5
function enterWarehouse() {
  scene='warehouse'; whPhase='explore'; whTimer=0;
  struggleBar=0; dustAlpha=0; whKey.found=false; ericStunTimer=0;
  eric.x=80; eric.y=300; ltW.x=-40; ltW.y=300;
}
function updateWarehouse() {
  whTimer++;
  if (whPhase==='explore' && whTimer===200) {
    showDialogue([
      "A door CRASHES open on the left!",
      "LORD TIME: 'You think you can just waltz in here?!'",
      "LORD TIME: 'I'll deal with you MYSELF!'",
      "Eric: 'I need to find a key — fast!'"
    ], ()=>{ whPhase='chased'; });
  }
  if (whPhase==='explore') {
    moveEric(whCrates); showInteractHint=false;
    const kc=whCrates[keyCrateIdx];
    if (!whKey.found && nearRect(eric,kc,55)) {
      showInteractHint=true; interactHintText='Press E to search crate';
      const eDown=keys['e']||keys['E'];
      if (eDown&&!eKeyWasDown) {
        eKeyWasDown=true;
        showDialogue([
          "Eric shoves the crate aside...",
          "Eric: 'There's something here!'",
          "Eric found a KEY! It fits the cage lock."
        ], ()=>{ whKey.found=true; inventory.push('Cage Key'); });
      }
    }
  }
  if (whPhase==='chased') {
    moveEric(whCrates);
    const dx=eric.x-ltW.x, dy=eric.y-ltW.y, d=Math.hypot(dx,dy);
    if (d>2) { ltW.x+=(dx/d)*ltW.speed; ltW.y+=(dy/d)*ltW.speed; }
    if (d<32) { whPhase='struggle'; struggleBar=0; ericStunTimer=999; }
    showInteractHint=false;
    const kc=whCrates[keyCrateIdx];
    if (!whKey.found && nearRect(eric,kc,55)) {
      showInteractHint=true; interactHintText='Press E to search crate';
      const eDown=keys['e']||keys['E'];
      if (eDown&&!eKeyWasDown) {
        eKeyWasDown=true;
        showDialogue(["Eric grabs behind the crate...","Got the KEY! Now free Ben!"],
          ()=>{ whKey.found=true; inventory.push('Cage Key'); });
      }
    }
    if (whKey.found && nearRect(eric,benCage,55)) {
      showInteractHint=true; interactHintText='Press E to unlock cage';
      const eDown=keys['e']||keys['E'];
      if (eDown&&!eKeyWasDown) {
        eKeyWasDown=true; whPhase='freeing';
        showDialogue([
          "Eric jams the key into the cage lock!",
          "CLICK — it swings open!",
          "BEN: 'Son! You made it!'",
          "ERIC: 'Dad! Are you okay?'",
          "BEN: 'I've been saving this for an emergency...'",
          "Ben pulls out a glowing device — the EDM.",
          "BEN: 'Existence Destroyer Machine. Stand back.'"
        ], ()=>{ inventory=inventory.filter(i=>i!=='Cage Key'); inventory.push('EDM'); whPhase='victory'; });
      }
    }
  }
  if (whPhase==='struggle') {
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) { struggleBar+=18; }
    eKeyWasDown=eDown;
    if (struggleBar>=100) { struggleBar=0; whPhase='chased'; ericStunTimer=0; ltW.x=Math.max(0,eric.x-120); }
  }
  if (whPhase==='victory') {
    showDialogue([
      "BEN: 'Time to end this — EDM ACTIVATE!'",
      "LORD TIME: 'What?! NO! I can't be erased!'",
      "LORD TIME: 'NOOOOOOOO—'",
      "Lord Time FADES into dust and silence.",
      "Eric: 'It's over. Let's go home, Dad.'"
    ], ()=>{ whPhase='dustfade'; whTimer=0; });
  }
  if (whPhase==='dustfade') {
    dustAlpha+=0.015;
    if (dustAlpha>=1) {
      showDialogue([
        "Ben and Eric step out of the warehouse.",
        "The Turbo Time Turtle 2000 waits outside.",
        "BEN: 'I never want to see 3099 again.'",
        "ERIC: 'Same. Let's go home.'"
      ], enterEscape);
    }
  }
}

// S6
function enterEscape() {
  scene='escape'; escPhase='run'; escTimer=0; warpBackTimer=0;
  eric.x=120; eric.y=310;
  benX=60; benY=330;
  inventory=inventory.filter(i=>i!=='EDM');
}
function updateEscape() {
  escTimer++;
  if (escPhase==='run') {
    moveEric([]);
    // Ben loosely follows Eric
    benX += (eric.x-50-benX)*0.06;
    benY += (eric.y+4-benY)*0.06;
    showInteractHint=false;
    if (nearRect(eric, escTurtle, 60)) {
      showInteractHint=true; interactHintText='Press E to board — go home!';
      const eDown=keys['e']||keys['E'];
      if (eDown&&!eKeyWasDown) {
        eKeyWasDown=true;
        showDialogue([
          "Eric and Ben climb aboard the Turbo Time Turtle 2000.",
          "ERIC: 'Setting destination — 2025!'",
          "BEN: 'Let's go home, son.'"
        ], ()=>{ escPhase='warping'; warpBackTimer=0; });
      }
    }
  }
  if (escPhase==='warping') {
    warpBackTimer++;
    if (warpBackTimer>180) { enterHome(); }
  }
}
function enterHome() {
  scene='home'; escPhase='credits'; creditsY=620; escTimer=0;
}
function updateHome() {
  escTimer++;
  if (escPhase==='credits') {
    creditsY -= 0.8;
    // Detect end of credits
    const totalH = creditLines.length * 28;
    if (creditsY < -totalH) {
      escPhase='done';
    }
  }
  if (escPhase==='done') {
    showInteractHint=true; interactHintText='Press E to continue...';
    const eDown=keys['e']||keys['E'];
    if (eDown&&!eKeyWasDown) {
      eKeyWasDown=true; enterEpilogue();
    }
  }
}

// EPILOGUE
function enterEpilogue() {
  scene='epilogue'; epPhase='regen'; epTimer=0;
  eyeOpenAmt=0; epTextAlpha=0; regenCount=0;
}
function updateEpilogue() {
  epTimer++;
  if (epPhase==='regen') {
    // "Regenerating..." pulses 3 times then moves on
    if (epTimer>240) { epPhase='eyeopen'; epTimer=0; }
  }
  if (epPhase==='eyeopen') {
    eyeOpenAmt = Math.min(1, eyeOpenAmt + 0.008);
    if (eyeOpenAmt>=1) { epPhase='reveal'; epTimer=0; epTextAlpha=0; }
  }
  if (epPhase==='reveal') {
    epTextAlpha=Math.min(1, epTextAlpha+0.012);
    if (epTimer>300) { epPhase='end'; epTimer=0; }
  }
}

function drawWarpScene(goingHome) {
  const p = goingHome ? warpBackTimer/180 : warpTimer/180;
  const hue=(p*300+200)%360;
  ctx.fillStyle=`hsl(${hue},80%,${5+p*10}%)`; ctx.fillRect(0,0,800,600);
  ctx.save(); ctx.translate(400,300);
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2,len=80+p*220,h2=(hue+i*6)%360;
    ctx.strokeStyle=`hsla(${h2},100%,70%,${0.4+p*0.6})`; ctx.lineWidth=1+p*2;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*20,Math.sin(a)*20); ctx.lineTo(Math.cos(a)*len,Math.sin(a)*len); ctx.stroke();
  }
  ctx.restore();
  const g=ctx.createRadialGradient(400,300,0,400,300,100*p);
  g.addColorStop(0,'rgba(255,255,255,0.9)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(400,300,100*p+10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
  ctx.fillText(goingHome?'RETURNING TO 2025...':'TRAVELLING TO 3099...',400,300);
  ctx.font='16px monospace'; ctx.fillStyle='#aaa';
  ctx.fillText(goingHome?`${Math.floor((1-p)*1074)} years back...`:`${Math.floor(p*1074)} years forward...`,400,340);
  ctx.textAlign='left';
}

  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,800,600);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(100,36,600,564);
  ctx.strokeStyle='rgba(255,255,0,0.08)'; ctx.lineWidth=1; ctx.setLineDash([15,15]);
  ctx.beginPath(); ctx.moveTo(400,36); ctx.lineTo(400,600); ctx.stroke();
  ctx.setLineDash([]);
  // Side walls / buildings
  ctx.fillStyle='#111'; ctx.fillRect(0,36,100,564); ctx.fillRect(700,36,100,564);
  ctx.strokeStyle='rgba(0,200,255,0.2)'; ctx.lineWidth=1;
  ctx.strokeRect(0,36,100,564); ctx.strokeRect(700,36,100,564);
  // Escape turtle
  const tx=escTurtle.x, ty=escTurtle.y;
  const pulse=0.7+Math.sin(Date.now()*0.005)*0.3;
  ctx.fillStyle=`rgba(102,187,106,${pulse})`; ctx.beginPath(); ctx.ellipse(tx+20,ty+18,22,18,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1b5e20'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx+20,ty+2); ctx.lineTo(tx+20,ty+34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx+2,ty+18); ctx.lineTo(tx+38,ty+18); ctx.stroke();
  ctx.fillStyle='#66bb6a'; ctx.beginPath(); ctx.ellipse(tx+38,ty+14,10,8,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(tx+43,ty+11,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#66bb6a'; ctx.fillRect(tx+4,ty+30,10,8); ctx.fillRect(tx+26,ty+30,10,8); ctx.fillRect(tx+2,ty+8,8,8); ctx.fillRect(tx+28,ty+8,8,8);
  // Sign
  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(escTurtle.x-10,escTurtle.y-30,80,22);
  ctx.fillStyle='#ffd54f'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText('HOME →',escTurtle.x+20,escTurtle.y-14); ctx.textAlign='left';
  // Ben
  drawBen(benX, benY);
  // Eric
  drawEric();
  // Atmosphere
  ctx.fillStyle='rgba(0,230,118,0.05)'; ctx.fillRect(0,0,800,600);
}

function drawHomeScene() {
  // House background (same as scene 1, festive)
  ctx.fillStyle='#87ceeb'; ctx.fillRect(0,0,800,320);
  ctx.fillStyle='#4caf50'; ctx.fillRect(0,320,800,280);
  ctx.fillStyle='#e8d5b7'; ctx.fillRect(house.x,house.y,house.w,house.h);
  ctx.fillStyle='#b22222';
  ctx.beginPath(); ctx.moveTo(house.x-10,house.y); ctx.lineTo(house.x+house.w/2,house.y-60); ctx.lineTo(house.x+house.w+10,house.y); ctx.fill();
  ctx.fillStyle='#5d4037'; ctx.fillRect(house.x+55,house.y+70,30,50);
  ctx.fillStyle='#b3e5fc'; ctx.fillRect(house.x+15,house.y+30,35,30); ctx.fillRect(house.x+90,house.y+30,35,30);
  [[tree1.x,tree1.y,tree1.r],[tree2.x,tree2.y,tree2.r]].forEach(([x,y,r])=>{
    ctx.fillStyle='#33691e'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5d4037'; ctx.fillRect(x-5,y+r-5,10,22);
  });
  // Eric & Ben standing together
  drawBen(340,370);
  ctx.fillStyle='#4fc3f7'; ctx.fillRect(370,370,24,24);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(374,372,16,14);
  ctx.fillStyle='#000'; ctx.fillRect(377,376,3,3); ctx.fillRect(384,376,3,3);
  // Turtle in yard
  const tx=240,ty=380;
  ctx.fillStyle='#388e3c'; ctx.beginPath(); ctx.ellipse(tx+20,ty+18,22,18,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1b5e20'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx+20,ty+2); ctx.lineTo(tx+20,ty+34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx+2,ty+18); ctx.lineTo(tx+38,ty+18); ctx.stroke();
  ctx.fillStyle='#66bb6a'; ctx.beginPath(); ctx.ellipse(tx+38,ty+14,10,8,0.3,0,Math.PI*2); ctx.fill();

  // Credits overlay
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,800,600);
  ctx.save();
  ctx.rect(0,36,800,564); ctx.clip();
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  creditLines.forEach((line,i)=>{
    const y = creditsY + i*28;
    if (y < -20 || y > 640) return;
    if (line.startsWith('~')) {
      ctx.font='bold 22px monospace'; ctx.fillStyle='#ffd54f';
    } else if (line.startsWith('A story')) {
      ctx.font='italic 16px monospace'; ctx.fillStyle='#aaddff';
    } else if (line==='[ continue for epilogue ]') {
      const pulse=0.6+Math.sin(Date.now()*0.006)*0.4;
      ctx.font='bold 15px monospace'; ctx.fillStyle=`rgba(255,200,50,${pulse})`;
    } else {
      ctx.font='15px monospace'; ctx.fillStyle='#ccc';
    }
    ctx.fillText(line,400,y);
  });
  ctx.restore();
  ctx.textAlign='left';
}

function drawEpilogueScene() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,800,600);

  if (epPhase==='regen') {
    const pulse=0.4+Math.sin(epTimer*0.08)*0.6;
    ctx.fillStyle=`rgba(180,0,0,${pulse})`; ctx.font='bold 20px monospace'; ctx.textAlign='center';
    ctx.fillText('Regenerating...', 400, 280);
    if (epTimer>80) ctx.fillText('Regenerating...', 400, 320);
    if (epTimer>160) ctx.fillText('Regenerating...', 400, 360);
    ctx.textAlign='left';
  }

  if (epPhase==='eyeopen'||epPhase==='reveal'||epPhase==='end') {
    // Draw the eye
    const cx=400, cy=300;
    const eyeW=160, eyeH=Math.max(2, 80*eyeOpenAmt);
    // Outer eye whites
    ctx.fillStyle='#1a0000';
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeW,eyeH+20,0,0,Math.PI*2); ctx.fill();
    // Eye white
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeW,eyeH,0,0,Math.PI*2); ctx.fill();
    // Iris
    ctx.fillStyle='#cc0000';
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeH*0.9,eyeH*0.9,0,0,Math.PI*2); ctx.fill();
    // Pupil
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeH*0.4,eyeH*0.4,0,0,Math.PI*2); ctx.fill();
    // Eyelid lines
    ctx.strokeStyle='#400'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeW,eyeH,0,Math.PI,0); ctx.stroke(); // top lid
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeW,eyeH,0,0,Math.PI);  ctx.stroke(); // bottom lid
    // Red glow
    const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,eyeW+40);
    glow.addColorStop(0,`rgba(200,0,0,${eyeOpenAmt*0.3})`);
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.ellipse(cx,cy,eyeW+40,eyeH+60,0,0,Math.PI*2); ctx.fill();
  }

  if (epPhase==='reveal'||epPhase==='end') {
    ctx.fillStyle=`rgba(200,50,50,${epTextAlpha})`; ctx.font='18px monospace'; ctx.textAlign='center';
    ctx.fillText('You might have removed me from existence...', 400, 460);
    if (epTimer>80) {
      ctx.fillStyle=`rgba(255,80,80,${epTextAlpha})`; ctx.font='bold 22px monospace';
      ctx.fillText('...But I\'ll be back.', 400, 500);
    }
  }

  if (epPhase==='end') {
    const pulse=0.5+Math.sin(Date.now()*0.004)*0.5;
    ctx.fillStyle=`rgba(255,220,50,${pulse})`; ctx.font='bold 26px monospace'; ctx.textAlign='center';
    ctx.fillText('To Be Continued...', 400, 555);
  }
  ctx.textAlign='left';
}

function drawHUD() {
  if (scene==='epilogue'||scene==='home') return;
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,800,36);
  const labels={
    house:"Scene 1: Eric's House", cockpit:'Scene 2: Turbo Time Turtle 2000',
    warp:'Warping through time...', city:"Scene 3: Year 3099 — City Streets",
    sidewalk:"Scene 4: City Sidewalk", warehouse:"Scene 5: The Warehouse",
    escape:"Scene 6: Escape!", home:"Back Home — 2025"
  };
  ctx.fillStyle='#fff'; ctx.font='14px monospace';
  ctx.fillText((labels[scene]||'')+'  |  Inventory:',10,22);
  inventory.forEach((item,i)=>{
    ctx.fillStyle='#ffd54f'; ctx.fillRect(300+i*140,5,132,26);
    ctx.fillStyle='#000'; ctx.font='11px monospace'; ctx.fillText(item,306+i*140,22);
  });
  if (!turtleSpawned&&turtleFlashTimer>60&&scene==='house') {
    ctx.fillStyle='rgba(255,255,200,0.9)'; ctx.font='bold 16px monospace';
    ctx.fillText('Something is flashing in the sky...',220,58);
  }
  if (scene==='cockpit'&&cockpitPhase==='explore') {
    ctx.fillStyle='#aaa'; ctx.font='12px monospace'; ctx.fillText('Walk to the KEYPAD to enter destination',220,58);
  }
  if (scene==='cockpit'&&cockpitPhase==='typed') {
    ctx.fillStyle='#00e676'; ctx.font='12px monospace'; ctx.fillText('Destination locked: 3099 — walk to GO button!',180,58);
  }
  if (scene==='warehouse'&&whPhase==='explore'&&!whKey.found) {
    ctx.fillStyle='#ff9800'; ctx.font='12px monospace'; ctx.fillText('Search the crates to find a KEY for the cage!',180,58);
  }
  if (scene==='warehouse'&&whPhase==='chased') {
    ctx.fillStyle='#f44336'; ctx.font='bold 12px monospace'; ctx.fillText('LORD TIME IS COMING — FIND THE KEY AND FREE BEN!',130,58);
  }
  if (showInteractHint&&!dialogueActive&&whPhase!=='struggle') {
    const w=ctx.measureText(interactHintText).width+40;
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(400-w/2,555,w,36);
    ctx.fillStyle='#ffd54f'; ctx.font='14px monospace'; ctx.textAlign='center';
    ctx.fillText(interactHintText,400,578); ctx.textAlign='left';
  }
}

function drawDialogue() {
  if(!dialogueActive) return;
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(60,430,680,150);
  ctx.strokeStyle='#ffd54f'; ctx.lineWidth=2; ctx.strokeRect(60,430,680,150);
  ctx.fillStyle='#fff'; ctx.font='15px monospace';
  ctx.fillText(dialogueLines[dialoguePage],80,468);
  ctx.fillStyle='#aaa'; ctx.font='12px monospace'; ctx.fillText('Press E or Space to continue',520,565);
  ctx.fillStyle='#666'; ctx.fillText(`${dialoguePage+1}/${dialogueLines.length}`,80,565);
}

// ── LOOP ──────────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0,0,800,600);
  if      (scene==='house')     drawHouseScene();
  else if (scene==='cockpit')   drawCockpitScene();
  else if (scene==='warp')      drawWarpScene(false);
  else if (scene==='city')      drawCityScene();
  else if (scene==='sidewalk')  drawSidewalkScene();
  else if (scene==='warehouse') drawWarehouseScene();
  else if (scene==='escape')    drawEscapeScene();
  else if (scene==='home')      drawHomeScene();
  else if (scene==='epilogue')  drawEpilogueScene();
  if (scene!=='warp'&&scene!=='epilogue') { drawHUD(); drawDialogue(); }
  if (scene==='home') drawDialogue();
  requestAnimationFrame(loop);
}
loop();

// ═══════════════════════════════════════════════════════════
// AUDIO ENGINE — Web Audio API, zero external files
// ═══════════════════════════════════════════════════════════
(function audioEngine() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  let ac, mGain, sGain, musicId = 0, curSceneMusic = null;

  function init() {
    if (ac) return;
    ac = new AC();
    mGain = ac.createGain(); mGain.gain.value = 0.13; mGain.connect(ac.destination);
    sGain = ac.createGain(); sGain.gain.value = 0.30; sGain.connect(ac.destination);
  }
  document.addEventListener('keydown', init);
  document.addEventListener('click', init);

  function T(freq, type, dur, vol, t, dest) {
    if (!ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(dest || sGain);
    o.start(t); o.stop(t + dur + 0.05);
  }

  function N(dur, cutoff, vol) {
    if (!ac) return;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = ac.createBufferSource();
    const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = cutoff; f.Q.value = 2;
    const g = ac.createGain(); g.gain.value = vol;
    s.buffer = buf; s.connect(f); f.connect(g); g.connect(sGain);
    s.start(ac.currentTime);
  }

  function sfxDialogue()     { if(!ac)return; const t=ac.currentTime; T(700,'square',0.03,0.07,t); T(900,'square',0.03,0.05,t+0.03); }
  function sfxPickup()       { if(!ac)return; const t=ac.currentTime; [523,659,784,1047].forEach((f,i)=>T(f,'sine',0.13,0.18,t+i*0.07)); }
  function sfxFootstep()     { if(!ac)return; T(55+Math.random()*25,'sine',0.04,0.07,ac.currentTime); }
  function sfxWarp()         { if(!ac)return; const t=ac.currentTime; for(let i=0;i<18;i++) T(150+i*65,'sawtooth',0.1,0.07,t+i*0.04,mGain); }
  function sfxSnakeHiss()    { N(0.4,800,0.22); }
  function sfxLordTime()     { if(!ac)return; const t=ac.currentTime; for(let i=0;i<7;i++) T(300-i*25,'sawtooth',0.14,0.18,t+i*0.06); }
  function sfxStruggleMash() { if(!ac)return; const t=ac.currentTime; T(130,'square',0.08,0.22,t); T(100,'sawtooth',0.06,0.15,t+0.03); }
  function sfxKeyFound()     { if(!ac)return; const t=ac.currentTime; [330,440,554,659].forEach((f,i)=>T(f,'sine',0.15,0.2,t+i*0.08)); }
  function sfxEDM()          { if(!ac)return; const t=ac.currentTime; for(let i=0;i<14;i++){T(1000-i*50,'sawtooth',0.18,0.22,t+i*0.04);T(160+i*18,'sine',0.14,0.14,t+i*0.04);} }
  function sfxVictory()      { if(!ac)return; const t=ac.currentTime; [523,659,784,1047,784,1047,1175,1047].forEach((f,i)=>T(f,'triangle',0.2,0.2,t+i*0.09)); }
  function sfxRedEye()       { if(!ac)return; const t=ac.currentTime; for(let i=0;i<10;i++) T(95-i*6,'sine',0.5,0.14,t+i*0.14,mGain); N(1.5,200,0.12); }
  function sfxDust()         { N(0.7,350,0.28); if(!ac)return; const t=ac.currentTime; for(let i=0;i<5;i++) T(380-i*40,'square',0.1,0.1,t+i*0.09); }
  function sfxTurtleSpawn()  { if(!ac)return; const t=ac.currentTime; [220,330,440,330,440,554].forEach((f,i)=>T(f,'sine',0.15,0.15,t+i*0.1)); }
  function sfxPaperPickup()  { if(!ac)return; const t=ac.currentTime; T(440,'sine',0.12,0.12,t); T(330,'sine',0.2,0.1,t+0.08); }
  function sfxSplash()       { N(0.25,400,0.18); if(!ac)return; T(200,'sine',0.15,0.1,ac.currentTime); }

  const SCENES = {
    house:     { bpm:96,  wave:'triangle', seq:[[261,2],[293,2],[329,4],[261,2],[349,2],[392,4],[329,2],[293,2],[261,8],[0,8]] },
    cockpit:   { bpm:80,  wave:'sine',     seq:[[440,2],[0,2],[494,2],[0,2],[523,4],[440,4],[0,4],[494,2],[0,6]] },
    city:      { bpm:155, wave:'sawtooth', seq:[[220,1],[247,1],[220,1],[196,1],[175,2],[196,2],[220,4]] },
    sidewalk:  { bpm:65,  wave:'triangle', seq:[[349,4],[330,4],[311,6],[0,2],[293,8],[0,4]] },
    warehouse: { bpm:55,  wave:'square',   seq:[[165,4],[0,2],[175,3],[0,3],[156,6],[0,6],[148,8],[0,4]] },
    escape:    { bpm:148, wave:'sawtooth', seq:[[523,1],[659,1],[784,1],[659,1],[523,2],[392,2],[523,4]] },
    home:      { bpm:100, wave:'triangle', seq:[[392,2],[440,2],[494,2],[523,4],[0,2],[349,2],[392,4],[329,8],[0,4]] },
    epilogue:  { bpm:38,  wave:'sine',     seq:[[110,8],[0,4],[116,8],[0,4],[98,12],[0,4]] },
  };

  function startSceneMusic(key) {
    if (!ac || !SCENES[key] || curSceneMusic === key) return;
    curSceneMusic = key;
    const id = ++musicId;
    const m = SCENES[key];
    const beat = 60 / m.bpm;
    let t = ac.currentTime + 0.1;
    function scheduleLoop() {
      if (musicId !== id) return;
      m.seq.forEach(([freq, beats]) => {
        if (freq > 0) {
          T(freq, m.wave, beat*beats*0.8, 0.11, t, mGain);
          if (key==='city'||key==='warehouse'||key==='escape')
            T(freq/2,'sine',beat*beats*0.55,0.07,t,mGain);
        }
        t += beat * beats;
      });
      const ms = m.seq.reduce((s,[,b])=>s+b,0)*beat*1000;
      setTimeout(scheduleLoop, ms - 150);
    }
    scheduleLoop();
  }

  const p = {
    dialoguePage:-1, turtleSpawned:false, cityPhase:'', sidewalkPhase:'',
    whPhase:'', epPhase:'', extractorPicked:false, keyFound:false,
    paperFound:false, warpTimer:0, warpBackTimer:0, snakeTick:0, struggleTick:0
  };

  setInterval(() => {
    if (!ac) return;
    const S = typeof scene !== 'undefined' ? scene : null;
    if (!S) return;

    const mKey = (S==='escape' && typeof escPhase!=='undefined' && escPhase==='warping') ? null : S;
    if (mKey && mKey !== curSceneMusic) startSceneMusic(mKey);

    const dp = typeof dialoguePage !== 'undefined' ? dialoguePage : -1;
    if (dp !== p.dialoguePage && dp >= 0) { if (p.dialoguePage >= 0) sfxDialogue(); p.dialoguePage = dp; }

    const ts = typeof turtleSpawned !== 'undefined' ? turtleSpawned : false;
    if (ts && !p.turtleSpawned) { sfxTurtleSpawn(); p.turtleSpawned = true; }

    const wt = typeof warpTimer !== 'undefined' ? warpTimer : 0;
    if (wt === 1 && p.warpTimer === 0) sfxWarp(); p.warpTimer = wt;
    const wbt = typeof warpBackTimer !== 'undefined' ? warpBackTimer : 0;
    if (wbt === 1 && p.warpBackTimer === 0) sfxWarp(); p.warpBackTimer = wbt;

    const cp = typeof cityPhase !== 'undefined' ? cityPhase : '';
    if (cp !== p.cityPhase) {
      if (cp === 'cutscene') sfxLordTime();
      if (cp === 'snake') sfxSnakeHiss();
      p.cityPhase = cp;
    }
    if (cp === 'snake') { p.snakeTick++; if (p.snakeTick % 55 === 0) sfxSnakeHiss(); }
    else p.snakeTick = 0;

    const ep2 = typeof extractor !== 'undefined' && extractor.pickedUp;
    if (ep2 && !p.extractorPicked) { sfxPickup(); p.extractorPicked = true; }
    if (!ep2) p.extractorPicked = false;

    const pf = typeof paper !== 'undefined' && paper.found;
    if (pf && !p.paperFound) { sfxPaperPickup(); p.paperFound = true; }
    if (!pf) p.paperFound = false;

    const sw = typeof sidewalkPhase !== 'undefined' ? sidewalkPhase : '';
    if (sw === 'tripped' && p.sidewalkPhase !== 'tripped') sfxSplash();
    p.sidewalkPhase = sw;

    const wp = typeof whPhase !== 'undefined' ? whPhase : '';
    if (wp !== p.whPhase) {
      if (wp === 'chased')   sfxLordTime();
      if (wp === 'victory')  { sfxEDM(); setTimeout(sfxVictory, 1300); }
      if (wp === 'dustfade') sfxDust();
      p.whPhase = wp;
    }

    const kf = typeof whKey !== 'undefined' && whKey.found;
    if (kf && !p.keyFound) { sfxKeyFound(); p.keyFound = true; }
    if (!kf) p.keyFound = false;

    if (wp === 'struggle' && typeof keys !== 'undefined' && (keys['e']||keys['E'])) {
      p.struggleTick++; if (p.struggleTick % 2 === 0) sfxStruggleMash();
    } else p.struggleTick = 0;

    const ep3 = typeof epPhase !== 'undefined' ? epPhase : '';
    if (ep3 !== p.epPhase) { if (ep3 === 'eyeopen') sfxRedEye(); p.epPhase = ep3; }

  }, 80);

  let lastX = 0, lastY = 0, stepN = 0;
  setInterval(() => {
    if (!ac || typeof eric === 'undefined') return;
    if (scene==='warp'||scene==='epilogue'||scene==='home') return;
    if (Math.abs(eric.x-lastX)>0.5||Math.abs(eric.y-lastY)>0.5) { stepN++; if(stepN%4===0) sfxFootstep(); }
    lastX = eric.x; lastY = eric.y;
  }, 60);

})();

</script>
