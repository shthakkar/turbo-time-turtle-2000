<!DOCTYPE html>
<html>
<head>
<title>Turbo Time Turtle 2000 — Chapter 3, Part 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { box-sizing: border-box; touch-action: none; }
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; overflow: hidden; }
  #game-wrapper { position: relative; }
  canvas { display: block; border: 2px solid #444; max-width: 100%; }
  #touch-controls { display: none; width: 100%; max-width: 800px; background: #111; padding: 8px 16px; }
  @media (pointer: coarse) { #touch-controls { display: flex; justify-content: space-between; align-items: center; } }
  #dpad { display: grid; grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px 44px; gap: 4px; }
  .dpad-btn { background: #222; border: 2px solid #444; border-radius: 8px; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .dpad-btn:active { background: #444; }
  #dpad-empty { background: transparent; border: none; }
  #btn-e { width: 80px; height: 80px; border-radius: 50%; background: #1a1a3a; border: 3px solid #7c4dff; color: #7c4dff; font-size: 22px; font-weight: bold; font-family: monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; }
  #btn-e:active { background: #2a2a5a; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game" width="800" height="600"></canvas>
</div>
<div id="touch-controls">
  <div id="dpad">
    <div></div><div class="dpad-btn" id="btn-up">▲</div><div></div>
    <div class="dpad-btn" id="btn-left">◀</div><div id="dpad-empty"></div><div class="dpad-btn" id="btn-right">▶</div>
    <div></div><div class="dpad-btn" id="btn-down">▼</div><div></div>
  </div>
  <div id="btn-e">E</div>
</div>

<script>
// ── CANVAS RESIZE ─────────────────────────────────────────────
function resizeCanvas() {
  const ctrl = document.getElementById('touch-controls');
  const mob = window.matchMedia('(pointer: coarse)').matches;
  const ch = mob ? (ctrl.offsetHeight || 120) : 0;
  const s = Math.min(window.innerWidth / 800, (window.innerHeight - ch) / 600);
  const c = document.getElementById('game');
  c.style.width = Math.floor(800 * s) + 'px';
  c.style.height = Math.floor(600 * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>

<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

// ── INPUT ─────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

function touchKey(k, d) { keys[k] = d; }
function bindTouch(id, key) {
  const el = document.getElementById(id); if (!el) return;
  el.addEventListener('touchstart',  e => { e.preventDefault(); touchKey(key, true);  }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('mousedown',   () => touchKey(key, true));
  el.addEventListener('mouseup',     () => touchKey(key, false));
  el.addEventListener('mouseleave',  () => touchKey(key, false));
}
bindTouch('btn-up','ArrowUp'); bindTouch('btn-down','ArrowDown');
bindTouch('btn-left','ArrowLeft'); bindTouch('btn-right','ArrowRight');
bindTouch('btn-e','e');
canvas.addEventListener('touchend', e => { e.preventDefault(); if (dlgActive) advanceDlg(); }, { passive: false });

// ── GLOBAL STATE ──────────────────────────────────────────────
let scene      = 'title';
let ticker     = 0;
let eDown      = false;
let sceneLabel = 0;

let dlgActive = false, dlgLines = [], dlgPage = 0, dlgCb = null;

const E = { x: 380, y: 260, w: 40, h: 56, spd: 3 };
const N = { x: 440, y: 265, w: 36, h: 52 };

// ── SCENE STATE ───────────────────────────────────────────────
let titleT = 0;

// plane_fly
let flyT = 0;
let flyPhase = 'fly'; // fly | captain | rumble
let rumbleT = 0;
const OBJ_CAPTAIN = { x: 120, y: 200, w: 36, h: 52 };
let captainTalked = false;

// plane_crash
let crashT = 0;
let crashPhase = 'shake'; // shake | kaboom | sink
let shakeX = 0, shakeY = 0;
let boomT = 0, boomR = 0;
let sinkY = 0;

// parachute
let chuteT = 0;
let chutePhase = 'fall'; // fall | land
let ericY = 50, nathanY = 80, seymourY = 20;
let ericVY = 0.8, nathanVY = 0.7, seymourVY = 1.1;

// lost_isle_air
let airT = 0;
let airPhase = 'walk'; // walk | cough | house
const OBJ_HOUSE = { x: 560, y: 120, w: 180, h: 240 };
let coughCount = 0;

// house_inside
let housePhase = 'look'; // look | found
let lookedAround = false;
const OBJ_CLOSET  = { x: 80,  y: 160, w: 80, h: 140 };
const OBJ_TABLE   = { x: 300, y: 300, w: 120, h: 60 };
const OBJ_MASKS   = { x: 560, y: 200, w: 80, h: 60 };

// masks
let masksT = 0;

// continue
let continueT = 0;

// ── HELPERS ───────────────────────────────────────────────────
function dlg(lines, cb) {
  dlgLines = lines; dlgPage = 0; dlgActive = true; dlgCb = cb || null;
}
function advanceDlg() {
  dlgPage++;
  if (dlgPage >= dlgLines.length) {
    dlgActive = false;
    const cb = dlgCb; dlgCb = null;
    if (cb) cb();
  }
}
function distC(a, b) {
  return Math.hypot((a.x+a.w/2)-(b.x+b.w/2),(a.y+a.h/2)-(b.y+b.h/2));
}
function near(a, b, d) { return distC(a,b) < d; }
function collide(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function moveE(obs) {
  let dx=0, dy=0;
  if (keys['ArrowLeft']||keys['a']||keys['A']) dx=-E.spd;
  if (keys['ArrowRight']||keys['d']||keys['D']) dx= E.spd;
  if (keys['ArrowUp']||keys['w']||keys['W'])    dy=-E.spd;
  if (keys['ArrowDown']||keys['s']||keys['S'])  dy= E.spd;
  let nx=Math.max(4,Math.min(756,E.x+dx));
  let ny=Math.max(60,Math.min(390,E.y+dy));
  for (const o of obs) { if(collide(nx,E.y,E.w,E.h,o.x,o.y,o.w,o.h)) nx=E.x; }
  for (const o of obs) { if(collide(E.x,ny,E.w,E.h,o.x,o.y,o.w,o.h)) ny=E.y; }
  E.x=nx; E.y=ny;
}

// ── SCENE TRANSITIONS ─────────────────────────────────────────
function goFly() {
  scene='plane_fly'; flyT=0; flyPhase='fly'; captainTalked=false;
  E.x=380; E.y=270; N.x=320; N.y=275;
  dlg([
    'The plane rumbled into the sky.',
    '"This is actually kind of exciting!" said Eric.',
    '"Don\'t get too comfortable," said Seymour from across the aisle.',
    'The plane lurched. Then steadied. Then lurched again.',
    '[ Walk around the cabin. Talk to the Captain up front! ]',
  ]);
}
function goCrash() {
  scene='plane_crash'; crashT=0; crashPhase='shake'; boomT=0; boomR=0; sinkY=0;
  dlg([
    'Suddenly — BANG BANG BANG!',
    '"That\'s not good." said Nathan.',
    '"THAT IS DEFINITELY NOT GOOD." said Eric.',
    'The right engine was ON FIRE.',
    'Seymour calmly put on his parachute.',
    '"EVERYONE GRAB A PARACHUTE!" he shouted.',
    '"There ARE no other parachutes!" said Eric.',
    '"Oh." said Seymour. "Improvise."',
  ], () => { crashPhase = 'kaboom'; boomT=0; });
}
function goParachute() {
  scene='parachute'; chuteT=0; chutePhase='fall';
  ericY=50; nathanY=90; seymourY=20;
  ericVY=0.8; nathanVY=0.7; seymourVY=1.1;
  dlg([
    'They grabbed whatever they could — a tablecloth, a seat cushion...',
    '...and one actual parachute (Seymour).',
    'They leapt from the sinking plane!',
    'Down, down, down they fell...',
    '...toward a dark green island below.',
    '"IS THAT THE LOST ISLE?!" shouted Eric.',
    '"YES!" shouted Seymour, already far ahead of them.',
    '"HOW ARE YOU GOING FASTER?!" shouted Nathan.',
    '"I HAVE A REAL PARACHUTE!" shouted Seymour.',
  ]);
}
function goAir() {
  scene='lost_isle_air'; airT=0; airPhase='walk'; coughCount=0;
  E.x=100; E.y=280; N.x=160; N.y=285;
  dlg([
    'THUD. They landed on The Lost Isle.',
    'The ground was dark and mossy.',
    'The trees were twisted and grey.',
    '"It\'s... creepy." said Eric.',
    '"The air smells wrong." said Nathan.',
    'Eric took a deep breath. Immediately felt dizzy.',
    '"Yep. Poisonous air." said Seymour.',
    '"YOU COULD HAVE WARNED US!" said Eric.',
    '"I thought you knew." said Seymour.',
    '"HOW WOULD WE KNOW?!" said Eric.',
    '[ The air is poisonous! Find shelter — head to that HOUSE! ]',
  ], () => { airPhase='cough'; });
}
function goHouse() {
  scene='house_inside'; housePhase='look'; lookedAround=false;
  E.x=200; E.y=280; N.x=270; N.y=285;
  dlg([
    'They stumbled through the door.',
    'The house was dark and dusty. Nobody home.',
    '"We need something to breathe through." said Nathan.',
    '"Check around — there might be masks or filters." said Seymour.',
    '[ Search the house! Check the closet, table, and shelves. ]',
  ]);
}
function goMasks() {
  scene='masks'; masksT=0;
  dlg([
    '"MASKS!" shouted Eric. "Right here!"',
    'A shelf of old oxygen masks — dusty but intact.',
    'They grabbed three and snapped them on.',
    'Eric took a careful breath. Clean air.',
    '"Oh thank goodness." he said.',
    '"Never doing that again." said Nathan.',
    '"You\'re on The Lost Isle." said Seymour. "You\'ll do it again."',
    '"Great." said Eric. "Just great."',
    'But at least they were safe. For now.',
  ], () => { goContinue(); });
}
function goContinue() {
  scene='continue'; continueT=0;
}

// ── UPDATE ────────────────────────────────────────────────────
function uTitle() {
  titleT++;
  const ed=keys['e']||keys['E']||keys[' '];
  if ((ed&&!eDown)||titleT>360) { eDown=true; goFly(); }
}

function uFly() {
  flyT++;
  moveE([OBJ_CAPTAIN]);
  N.x+=(E.x-60-N.x)*0.06; N.y+=(E.y-N.y)*0.06;

  if (flyPhase==='fly' && !captainTalked && near(E, OBJ_CAPTAIN, 90)) {
    if (keys['e']||keys['E']) {
      eDown=true; captainTalked=true;
      dlg([
        'The captain was a very small green man in a huge hat.',
        '"WELCOME ABOARD CHEAP GREMLIN AIRLINES!" he squeaked.',
        '"I am Captain Zorp. Flight time: about 3 hours!"',
        '"Any questions?"',
        '"Is the plane safe?" said Eric.',
        '"ABSOLUTELY!" said Zorp. "...Probably! Ha ha!"',
        '"Ha." said Eric flatly.',
        '"Relax! Nothing ever goes wrong on Cheap Gremlin Airlines!"',
        'Right on cue — a horrible grinding noise from outside.',
        '"...That is normal." said Zorp, sweating.',
      ], () => { flyPhase='rumble'; rumbleT=0; });
    }
  }

  if (flyPhase==='rumble') {
    rumbleT++;
    if (rumbleT>180) goCrash();
  }
}

function uCrash() {
  crashT++;

  if (crashPhase==='shake') return; // handled by dlg cb

  if (crashPhase==='kaboom') {
    boomT++;
    boomR = Math.min(200, boomT*4);
    if (boomT>80) { crashPhase='sink'; boomT=0; }
  }

  if (crashPhase==='sink') {
    sinkY += 1.5;
    if (sinkY > 300) {
      goParachute();
    }
  }
}

function uParachute() {
  chuteT++;
  if (dlgActive) return;

  const groundY = 420;
  ericY   = Math.min(groundY, ericY   + ericVY   * (1 + chuteT*0.008));
  nathanY = Math.min(groundY, nathanY + nathanVY  * (1 + chuteT*0.008));
  seymourY= Math.min(groundY, seymourY+ seymourVY * (1 + chuteT*0.008));

  if (chutePhase==='fall' && ericY>=groundY && nathanY>=groundY && seymourY>=groundY) {
    chutePhase='land';
    setTimeout(() => { goAir(); }, 1200);
  }
}

function uAir() {
  airT++;
  N.x+=(E.x-60-N.x)*0.05; N.y+=(E.y-N.y)*0.05;

  if (airPhase==='cough') {
    moveE([OBJ_HOUSE]);
    if (near(E, OBJ_HOUSE, 110)) {
      if (keys['e']||keys['E']) {
        eDown=true; airPhase='house';
        dlg([
          'They crashed through the front door!',
          '"Sorry!" said Nathan, to nobody.',
          '"Nobody lives here." said Seymour. "Look around."',
        ], () => { goHouse(); });
      }
    }
  }
}

function uHouse() {
  moveE([OBJ_CLOSET, OBJ_TABLE]);
  N.x+=(E.x-60-N.x)*0.05; N.y+=(E.y-N.y)*0.05;

  const items = [
    { obj: OBJ_CLOSET, lines: [
      'Eric opened the closet.',
      'Old coats. A broken umbrella. A jar of pickles.',
      '"No masks." said Eric. He took the pickles anyway.',
    ]},
    { obj: OBJ_TABLE, lines: [
      'Nathan checked the table.',
      'A dusty bowl. Some old newspapers.',
      'The headline: "LOST ISLE — EVACUATION ORDERED."',
      '"...That\'s not encouraging." said Nathan.',
    ]},
  ];

  for (const item of items) {
    if (!item._done && near(E, item.obj, 80)) {
      if (keys['e']||keys['E']) {
        eDown=true; item._done=true;
        dlg(item.lines);
        break;
      }
    }
  }

  if (near(E, OBJ_MASKS, 90)) {
    if (keys['e']||keys['E']) {
      eDown=true; housePhase='found';
      goMasks();
    }
  }
}

function uMasks() {
  masksT++;
}

function uContinue() {
  continueT++;
  const ed=keys['e']||keys['E']||keys[' '];
  if (continueT>60 && ed && !eDown) {
    window.location.href='ch3-part3.html';
  }
}

// ── DRAW ──────────────────────────────────────────────────────

// ── SPRITES ───────────────────────────────────────────────────
function dEric(x, y, label) {
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x+20,y+58,18,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#212121'; ctx.fillRect(x+2,y+47,18,9); ctx.fillRect(x+20,y+47,18,9);
  ctx.fillStyle='#1a237e'; ctx.fillRect(x+4,y+32,15,17); ctx.fillRect(x+21,y+32,15,17);
  ctx.fillStyle='#bf360c'; ctx.fillRect(x+3,y+30,34,5);
  ctx.fillStyle='#1565c0'; ctx.fillRect(x+2,y+18,36,14);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x-5,y+18,9,18); ctx.fillRect(x+36,y+18,9,18);
  ctx.fillStyle='#ffb74d'; ctx.fillRect(x-5,y+33,9,5); ctx.fillRect(x+36,y+33,9,5);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+16,y+14,8,6);
  ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(x+20,y+12,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4e342e';
  ctx.beginPath(); ctx.arc(x+20,y+6,14,Math.PI,0); ctx.fill();
  ctx.fillRect(x+6,y,28,8);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+14,y+12,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+26,y+12,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a237e'; ctx.beginPath(); ctx.arc(x+15,y+12,2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+27,y+12,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4e342e'; ctx.fillRect(x+10,y+7,8,2); ctx.fillRect(x+22,y+7,8,2);
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x+20,y+16,4,0.15,Math.PI-0.15); ctx.stroke();
  if (label && sceneLabel>0 && Math.floor(ticker/12)%2===0) {
    ctx.fillStyle='#ffd700'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('▼ YOU (ERIC)', x+20, y-8); ctx.textAlign='left';
  }
}

function dNathan(x, y) {
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x+18,y+53,16,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2e7d32'; ctx.fillRect(x+2,y+17,32,13);
  ctx.fillStyle='#37474f'; ctx.fillRect(x+3,y+29,13,15); ctx.fillRect(x+20,y+29,13,15);
  ctx.fillStyle='#1b5e20'; ctx.fillRect(x+2,y+44,15,8); ctx.fillRect(x+19,y+44,15,8);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x-4,y+17,8,16); ctx.fillRect(x+32,y+17,8,16);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+14,y+13,8,6);
  ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(x+18,y+11,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f9a825';
  ctx.beginPath(); ctx.arc(x+18,y+5,12,Math.PI,0); ctx.fill();
  ctx.fillRect(x+6,y,24,7);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+12,y+11,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+24,y+11,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1565c0'; ctx.beginPath(); ctx.arc(x+13,y+11,1.8,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+25,y+11,1.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f9a825'; ctx.fillRect(x+9,y+7,7,2); ctx.fillRect(x+21,y+7,7,2);
}

function dSeymour(x, y) {
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(x+18,y+54,16,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(x+1,y+46,16,9); ctx.fillRect(x+19,y+46,16,9);
  ctx.fillStyle='#546e7a'; ctx.fillRect(x+3,y+30,13,18); ctx.fillRect(x+20,y+30,13,18);
  ctx.fillStyle='#455a64'; ctx.fillRect(x+1,y+16,34,16);
  ctx.fillStyle='#546e7a'; ctx.fillRect(x+1,y+16,8,16); ctx.fillRect(x+27,y+16,8,16);
  ctx.fillStyle='#8d6e63'; ctx.fillRect(x+15,y+17,6,12);
  ctx.fillStyle='#546e7a'; ctx.fillRect(x-4,y+16,8,18); ctx.fillRect(x+32,y+16,8,18);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x-4,y+31,8,5); ctx.fillRect(x+32,y+31,8,5);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+14,y+12,8,6);
  ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(x+18,y+10,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#90a4ae';
  ctx.beginPath(); ctx.arc(x+18,y+4,13,Math.PI,0); ctx.fill();
  ctx.fillRect(x+5,y-2,8,7); ctx.fillRect(x+23,y-2,8,7);
  ctx.fillStyle='#fff'; ctx.fillRect(x+9,y+9,7,4); ctx.fillRect(x+22,y+9,7,4);
  ctx.fillStyle='#333'; ctx.fillRect(x+11,y+10,3,3); ctx.fillRect(x+24,y+10,3,3);
  ctx.fillStyle='#546e7a'; ctx.fillRect(x+9,y+6,7,2); ctx.fillRect(x+22,y+7,7,2);
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x+18,y+19,4,Math.PI+0.2,2*Math.PI-0.2); ctx.stroke();
}

// Captain Zorp — tiny green gremlin in big hat
function dZorp(x, y) {
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(x+12,y+42,11,4,0,0,Math.PI*2); ctx.fill();
  // body — tiny (scale ~0.7)
  ctx.fillStyle='#1b5e20'; ctx.fillRect(x+3,y+18,18,16); // uniform jacket
  ctx.fillStyle='#ffd700'; ctx.fillRect(x+3,y+18,18,4); // gold stripe
  ctx.fillStyle='#2e7d32'; ctx.fillRect(x+5,y+34,7,10); ctx.fillRect(x+12,y+34,7,10); // legs
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(x+4,y+42,8,5); ctx.fillRect(x+12,y+42,8,5); // shoes
  // arms
  ctx.fillStyle='#1b5e20'; ctx.fillRect(x-2,y+18,6,12); ctx.fillRect(x+20,y+18,6,12);
  ctx.fillStyle='#a5d6a7'; ctx.fillRect(x-2,y+28,6,4); ctx.fillRect(x+20,y+28,6,4);
  // neck + head — green
  ctx.fillStyle='#a5d6a7'; ctx.fillRect(x+9,y+12,6,7);
  ctx.fillStyle='#a5d6a7'; ctx.beginPath(); ctx.arc(x+12,y+10,9,0,Math.PI*2); ctx.fill();
  // big captain hat
  ctx.fillStyle='#1a237e'; ctx.fillRect(x+2,y-10,20,14); // brim
  ctx.fillRect(x+5,y-28,14,20); // top
  ctx.fillStyle='#ffd700'; ctx.fillRect(x+2,y-2,20,3); // gold band
  ctx.fillStyle='#ffd700'; ctx.fillRect(x+7,y-22,10,8); // badge on hat
  // eyes — big gremlin eyes
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+8,y+9,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+16,y+9,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e53935'; ctx.beginPath(); ctx.arc(x+9,y+9,1.8,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+17,y+9,1.8,0,Math.PI*2); ctx.fill();
  // big grin
  ctx.strokeStyle='#2e7d32'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x+12,y+13,4,0.1,Math.PI-0.1); ctx.stroke();
}

function glow(obj, nearDist) {
  if (!near(E, obj, nearDist)) return;
  const a=(Math.sin(ticker*0.12)+1)*0.5*0.35+0.15;
  ctx.fillStyle=`rgba(255,215,0,${a})`;
  ctx.fillRect(obj.x-6,obj.y-6,obj.w+12,obj.h+12);
  ctx.strokeStyle=`rgba(255,215,0,${a+0.3})`; ctx.lineWidth=3;
  ctx.strokeRect(obj.x-6,obj.y-6,obj.w+12,obj.h+12);
  if (!dlgActive) {
    const ey=obj.y-28+Math.sin(ticker*0.1)*5;
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(obj.x+obj.w/2-20,ey-14,40,18);
    ctx.fillStyle='#ffd700'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('[E]',obj.x+obj.w/2,ey); ctx.textAlign='left';

}

function dCrash() {
  // sky outside
  ctx.fillStyle='#1a237e'; ctx.fillRect(0,0,800,600);

  if (crashPhase==='shake') {
    const shk=Math.sin(ticker*1.2)*6;
    ctx.save(); ctx.translate(shk, shk*0.5);
    dPlaneInterior();
    dNathan(N.x+shk, N.y);
    dEric(E.x-shk, E.y, false);
    dSeymour(460+shk, 270);
    ctx.restore();
    ctx.fillStyle='rgba(255,100,0,0.15)'; ctx.fillRect(0,0,800,600);
  }

  if (crashPhase==='kaboom') {
    // plane fragments
    ctx.fillStyle='#eceff1'; ctx.fillRect(0,80,800,340);
    ctx.fillStyle='rgba(255,100,0,0.4)'; ctx.fillRect(0,0,800,600);
    // explosion
    const bx=650, by=200;
    for (let r=3;r>=0;r--) {
      const grad=ctx.createRadialGradient(bx,by,0,bx,by,boomR*(1-r*0.2));
      grad.addColorStop(0,r===0?'#fff':'rgba(255,200,0,0.9)');
      grad.addColorStop(0.4,'rgba(255,80,0,0.7)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(bx,by,boomR*(1-r*0.2),0,Math.PI*2); ctx.fill();
    }
    ctx.shadowColor='#ff8f00'; ctx.shadowBlur=40;
    ctx.fillStyle='#fff'; ctx.font='bold 60px monospace'; ctx.textAlign='center';
    if (boomT<40) ctx.fillText('KABOOM!',400,300);
    ctx.shadowBlur=0; ctx.textAlign='left';
    dEric(300,280,false); dNathan(360,285); dSeymour(180,275);
  }

  if (crashPhase==='sink') {
    // ocean
    ctx.fillStyle='#0d47a1'; ctx.fillRect(0,0,800,600);
    for (let wi=0;wi<8;wi++) {
      const wx=(wi*120+ticker*2)%900-50;
      const wy=200+Math.sin(wi*1.3)*30;
      ctx.fillStyle='rgba(100,200,255,0.3)';
      ctx.beginPath(); ctx.arc(wx,wy,40,0,Math.PI*2); ctx.fill();
    }
    // sinking plane
    const py=sinkY;
    ctx.fillStyle='#90a4ae'; ctx.fillRect(100,py,500,80); // fuselage
    ctx.fillStyle='#78909c'; ctx.fillRect(220,py+60,200,30); // wing
    ctx.fillStyle='rgba(255,100,0,0.6)'; ctx.fillRect(540,py,40,40); // fire
    // water line
    ctx.fillStyle='rgba(13,71,161,0.7)'; ctx.fillRect(0,300,800,300);
    ctx.fillStyle='rgba(100,200,255,0.3)';
    for (let wi=0;wi<6;wi++) {
      ctx.beginPath(); ctx.arc((wi*140+ticker*3)%850,302,25,0,Math.PI);
      ctx.fill();
    }
    ctx.fillStyle='#fff'; ctx.font='bold 24px monospace'; ctx.textAlign='center';
    ctx.fillText('THE PLANE IS SINKING!',400,80); ctx.textAlign='left';
    dEric(150,120,false); dNathan(200,125); dSeymour(260,115);
  }
}

function dParachute() {
  // sky → island below
  const skyA=Math.min(1,chuteT/120);
  ctx.fillStyle='#87ceeb'; ctx.fillRect(0,0,800,600);
  // clouds
  for (let ci=0;ci<5;ci++) {

    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+25,cy-10,22,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-20,cy-5,18,0,Math.PI*2); ctx.fill();
  }
  // island below
  ctx.fillStyle='#1b5e20'; ctx.beginPath();
  ctx.ellipse(400,480,260,80,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2e7d32'; ctx.beginPath();
  ctx.ellipse(400,470,220,60,0,0,Math.PI*2); ctx.fill();
  // ocean around island
  ctx.fillStyle='#1565c0'; ctx.fillRect(0,460,800,140);
  ctx.fillStyle='#1b5e20'; ctx.beginPath();
  ctx.ellipse(400,490,260,70,0,0,Math.PI*2); ctx.fill();

  // draw parachutists
  function drawChutist(px, py, col, hasChute, label) {
    if (hasChute) {
      // chute
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(px,py-50,35,Math.PI,0); ctx.fill();
      ctx.strokeStyle=col; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(px-35,py-50); ctx.lineTo(px,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px+35,py-50); ctx.lineTo(px,py); ctx.stroke();
    } else {
      // seat cushion / tablecloth flailing
      ctx.fillStyle=col; ctx.fillRect(px-15,py-40,30,20);
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(px,py-20); ctx.lineTo(px,py); ctx.stroke();
    }
    ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(px,py,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='10px monospace'; ctx.textAlign='center';
    ctx.fillText(label,px,py-62); ctx.textAlign='left';
  }

  drawChutist(220, ericY,   '#1565c0', false, 'ERIC');
  drawChutist(380, nathanY, '#2e7d32', false, 'NATHAN');
  drawChutist(560, seymourY,'#7c4dff', true,  'SEYMOUR');

  if (chutePhase==='land') {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,800,600);
    ctx.fillStyle='#fff'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
    ctx.fillText('THUD.',400,300); ctx.textAlign='left';
  }
  // HUD
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(8,8,240,26);
  ctx.fillStyle='#87ceeb'; ctx.font='bold 13px monospace'; ctx.fillText('Falling toward The Lost Isle...',14,27);
}

function dContinueScreen() {
  ctx.fillStyle='#000011'; ctx.fillRect(0,0,800,600);
  for (let i=0;i<70;i++) {
    const sx=(i*137+50)%800, sy=(i*97+30)%580;
    ctx.fillStyle=`rgba(255,255,255,${(Math.sin(ticker*0.04+i)*0.4+0.6)*0.7})`;
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.textAlign='center';
  const pulse=(Math.sin(ticker*0.06)+1)*0.5;
  ctx.shadowColor='#00e676'; ctx.shadowBlur=20+pulse*10;
  ctx.fillStyle='#00e676'; ctx.font='bold 30px monospace';
  ctx.fillText('End of Part 2', 400, 220);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700'; ctx.font='18px monospace';
  ctx.fillText('Up next: Part 3 — Lost Isle Investigation', 400, 275);
  ctx.fillStyle='#aaa'; ctx.font='14px monospace';
  ctx.fillText('They have masks. They have the isle.', 400, 318);
  ctx.fillText('But something very strange is going on...', 400, 343);
  if (continueT>60 && Math.floor(ticker/15)%2===0) {
    ctx.fillStyle='#fff'; ctx.font='bold 17px monospace';
    ctx.fillText('► Press E to continue to Part 3 ◄', 400, 430);
  }
  // small island drawing
  ctx.fillStyle='#1b5e20';
  ctx.beginPath(); ctx.ellipse(400,150,100,35,0,0,Math.PI*2); ctx.fill();
  // twisted tree on island
  ctx.fillStyle='#1a2a1a'; ctx.fillRect(410,100,8,52);
  ctx.strokeStyle='#1a2a1a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(414,120); ctx.quadraticCurveTo(380,100,365,90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(414,130); ctx.quadraticCurveTo(445,108,455,96); ctx.stroke();
  ctx.textAlign='left';
}

// ── DIALOGUE BOX ──────────────────────────────────────────────
function dDialogue() {
  if (!dlgActive) return;
  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(10,448,780,148);
  ctx.strokeStyle='#7c4dff'; ctx.lineWidth=2; ctx.strokeRect(10,448,780,148);
  ctx.fillStyle='#7c4dff'; ctx.fillRect(10,448,780,4);
  ctx.fillStyle='#fff'; ctx.font='16px monospace';
  const line=dlgLines[dlgPage]||'';
  const words=line.split(' ');
  let ly=480, lt='';
  for (const w of words) {
    const test=lt+(lt?' ':'')+w;
    if (ctx.measureText(test).width>740) { ctx.fillText(lt,24,ly); ly+=24; lt=w; }
    else lt=test;
  }
  if (lt) ctx.fillText(lt,24,ly);
  ctx.fillStyle='#555'; ctx.font='12px monospace';
  ctx.fillText(`${dlgPage+1}/${dlgLines.length}`,24,584);
  if (Math.floor(ticker/12)%2===0) { ctx.fillStyle='#ffd700'; ctx.font='bold 12px monospace'; ctx.textAlign='right'; ctx.fillText('E / Space ▶',780,584); ctx.textAlign='left'; }
}

function dControls() {
  if (scene==='title'||scene==='parachute'||scene==='plane_crash'||scene==='continue') return;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(8,8,238,26);
  ctx.fillStyle='#555'; ctx.font='12px monospace';
  ctx.fillText('Move: WASD/Arrows  |  Act: E',14,27);
}

// ── MUSIC ─────────────────────────────────────────────────────
(function() {
  let ac;
  try { ac=new (window.AudioContext||window.webkitAudioContext)(); } catch(e) { return; }
  function note(f,t,d,type,v) {
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type||'square'; o.frequency.value=f;
    g.gain.setValueAtTime(v||0.04,ac.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+d);
    o.start(ac.currentTime+t); o.stop(ac.currentTime+t+d+0.01);
  }
  const B=0.17;
  const mel=[
    [349,0],[392,1],[440,2],[494,3],[523,4],[494,5],[440,6],[392,7],
    [440,8],[494,9],[523,10],[587,11],[523,12],[494,13],[440,14],[415,15],
    [440,16],[494,17],[523,18],[587,19],[659,20],[587,21],[523,22],[494,23],
    [523,24],[494,25],[440,26],[415,27],[392,28],[370,29],[349,30],[330,31],
  ];
  const bass=[175,175,196,175,196,220,196,175];
  function loop() {
    mel.forEach(([f,b])=>note(f,b*B,B*0.65,'square',0.033));
    bass.forEach((f,i)=>note(f,i*B*4,B*3.3,'triangle',0.05));
    setTimeout(loop,32*B*1000*0.96);
  }
  const go=()=>{ if(ac.state==='suspended') ac.resume(); loop(); };
  document.addEventListener('keydown',go,{once:true});
  canvas.addEventListener('touchstart',go,{once:true,passive:true});
})();

// ── GAME LOOP ─────────────────────────────────────────────────
(function loop() {
  ticker++;
  if (sceneLabel>0) sceneLabel--;

  if (dlgActive) {
    const ed=keys['e']||keys['E']||keys[' '];
    if (ed&&!eDown) advanceDlg();
    eDown=ed;
  } else {
    eDown=false;
    if (scene==='title')        uTitle();
    if (scene==='plane_fly')    uFly();
    if (scene==='plane_crash')  uCrash();
    if (scene==='parachute')    uParachute();
    if (scene==='lost_isle_air')uAir();
    if (scene==='house_inside') uHouse();
    if (scene==='masks')        uMasks();
    if (scene==='continue')     uContinue();
  }

  ctx.clearRect(0,0,800,600);
  ctx.textAlign='left';

  if (scene==='title')        dTitle();
  if (scene==='plane_fly')    dFly();
  if (scene==='plane_crash')  dCrash();
  if (scene==='parachute')    dParachute();
  if (scene==='lost_isle_air')dIsle();
  if (scene==='house_inside') dHouseInside();
  if (scene==='masks')        dMasksScene();
  if (scene==='continue')     dContinueScreen();

  dDialogue();
  dControls();

  requestAnimationFrame(loop);
})();
</script>
