<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Samarth's Times Tables</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d2e;
      color: #fff;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Star background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 8%, #fffacd 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 55%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 70%, #fffacd 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 35%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 75%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 90%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 80%, #fffacd 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 50%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 55%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 30%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 10%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 20% 25%, #fffacd 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .hidden { display: none !important; }

    /* ===== SELECT SCREEN ===== */
    #screen-select {
      justify-content: flex-start;
      padding-top: 30px;
    }

    .title {
      font-size: clamp(28px, 7vw, 52px);
      text-align: center;
      color: #ffd700;
      text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: clamp(14px, 3.5vw, 18px);
      color: #aad4ff;
      text-align: center;
      margin-bottom: 24px;
    }

    .pr-display {
      font-size: clamp(14px, 3.5vw, 18px);
      color: #90ee90;
      text-align: center;
      margin-bottom: 20px;
      min-height: 26px;
      transition: all 0.3s;
    }

    .number-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 28px;
    }

    .num-btn {
      border: none;
      border-radius: 16px;
      padding: 18px 8px;
      font-family: inherit;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, outline 0.15s;
      outline: 4px solid transparent;
      outline-offset: 2px;
    }

    .num-btn:hover { transform: scale(1.08); }

    .num-btn.selected {
      outline: 4px solid #fff;
      transform: scale(1.12);
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
    }

    .num-btn:nth-child(1)  { background: #e74c3c; color: #fff; }
    .num-btn:nth-child(2)  { background: #e67e22; color: #fff; }
    .num-btn:nth-child(3)  { background: #f1c40f; color: #333; }
    .num-btn:nth-child(4)  { background: #2ecc71; color: #fff; }
    .num-btn:nth-child(5)  { background: #1abc9c; color: #fff; }
    .num-btn:nth-child(6)  { background: #3498db; color: #fff; }
    .num-btn:nth-child(7)  { background: #9b59b6; color: #fff; }
    .num-btn:nth-child(8)  { background: #e91e8c; color: #fff; }
    .num-btn:nth-child(9)  { background: #a8e063; color: #333; }
    .num-btn:nth-child(10) { background: #00bcd4; color: #fff; }
    .num-btn:nth-child(11) { background: #ff7043; color: #fff; }
    .num-btn:nth-child(12) { background: #ffd700; color: #333; }

    .start-btn {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a0050;
      border: none;
      border-radius: 50px;
      padding: 16px 60px;
      font-family: inherit;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,215,0,0.5);
    }

    .start-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .start-btn:not(:disabled):hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(255,215,0,0.7);
    }

    /* ===== PLAYING SCREEN ===== */
    #screen-playing {
      justify-content: flex-start;
      padding-top: 0;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 5px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #ffd700);
      border-radius: 5px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin-bottom: 12px;
    }

    .question-counter {
      font-size: clamp(14px, 3.5vw, 18px);
      color: #aad4ff;
    }

    .timer-display {
      font-size: clamp(18px, 4.5vw, 26px);
      color: #ffd700;
      font-weight: bold;
      text-shadow: 0 0 10px #ffd700;
      letter-spacing: 2px;
    }

    .equation-vertical {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      margin: 30px 0 28px;
      min-width: 160px;
    }

    .eq-top {
      font-size: clamp(64px, 18vw, 108px);
      color: #fff;
      text-shadow: 0 0 20px #ffd700, 0 0 40px rgba(255,215,0,0.4);
      line-height: 1.1;
      text-align: right;
    }

    .eq-bottom {
      font-size: clamp(64px, 18vw, 108px);
      color: #fff;
      text-shadow: 0 0 20px #ffd700, 0 0 40px rgba(255,215,0,0.4);
      line-height: 1.1;
      display: flex;
      align-items: baseline;
      gap: 12px;
      width: 100%;
      justify-content: flex-end;
    }

    .eq-times {
      font-size: clamp(40px, 11vw, 72px);
      color: #aad4ff;
    }

    .eq-line {
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, transparent, #fff 20%, #fff 80%, transparent);
      border-radius: 3px;
      margin-top: 8px;
    }

    .answer-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 300px;
    }

    .answer-input {
      width: 100%;
      font-family: inherit;
      font-size: clamp(32px, 10vw, 52px);
      text-align: center;
      background: rgba(255,255,255,0.1);
      border: 3px solid #00e5ff;
      border-radius: 20px;
      color: #fff;
      padding: 12px 20px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .answer-input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    .submit-btn {
      background: linear-gradient(135deg, #00e5ff, #0080ff);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 50px;
      font-family: inherit;
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0,229,255,0.4);
    }

    .submit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 22px rgba(0,229,255,0.6);
    }

    /* ===== RESULT SCREEN ===== */
    #screen-result {
      justify-content: center;
      text-align: center;
      gap: 16px;
    }

    .result-title {
      font-size: clamp(28px, 8vw, 52px);
      color: #ffd700;
      text-shadow: 0 0 20px #ffd700;
    }

    .result-time {
      font-size: clamp(36px, 10vw, 64px);
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .result-score {
      font-size: clamp(18px, 4.5vw, 26px);
      color: #aad4ff;
    }

    .result-pr {
      font-size: clamp(16px, 4vw, 22px);
      color: #90ee90;
    }

    .pb-banner {
      font-size: clamp(24px, 7vw, 44px);
      color: #ffd700;
      text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
      animation: pbPulse 0.6s ease-in-out infinite alternate;
      margin: 8px 0;
    }

    @keyframes pbPulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    .result-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
      width: 100%;
      max-width: 320px;
    }

    .replay-btn {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a0050;
      border: none;
      border-radius: 50px;
      padding: 15px 30px;
      font-family: inherit;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(255,215,0,0.4);
    }

    .replay-btn:hover { transform: scale(1.05); }

    .choose-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      padding: 14px 30px;
      font-family: inherit;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    .choose-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.03);
    }

    /* ===== FLASH OVERLAY ===== */
    #flash-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #flash-overlay.correct {
      background: rgba(0, 200, 100, 0.3);
    }

    #flash-overlay.wrong {
      background: rgba(220, 50, 50, 0.3);
    }

    /* Feedback text */
    #feedback-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(28px, 8vw, 52px);
      font-family: 'Comic Sans MS', cursive, sans-serif;
      font-weight: bold;
      pointer-events: none;
      z-index: 101;
      opacity: 0;
      text-align: center;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    /* ===== CONFETTI ===== */
    #confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
    }

    .confetti-particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    .star-burst {
      position: absolute;
      font-size: 24px;
      animation: starExpand ease-out forwards;
    }

    @keyframes starExpand {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- SELECT SCREEN -->
  <div id="screen-select" class="screen">
    <h1 class="title">Samarth's Times Tables</h1>
    <p class="subtitle">Pick a number to practice!</p>
    <div class="pr-display" id="pr-display">Choose a number to see your best time</div>
    <div class="number-grid" id="number-grid">
      <!-- buttons injected by JS -->
    </div>
    <button class="start-btn" id="start-btn" disabled>START!</button>
  </div>

  <!-- PLAYING SCREEN -->
  <div id="screen-playing" class="screen hidden">
    <div class="progress-bar-wrap" style="width:100%;max-width:500px;">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="top-bar">
      <div class="question-counter" id="question-counter">Question 1 / 30</div>
      <div class="timer-display" id="timer-display">0:00</div>
    </div>
    <div class="equation-vertical">
      <div class="eq-top" id="eq-top">?</div>
      <div class="eq-bottom"><span class="eq-times">×</span><span id="eq-bottom-num">?</span></div>
      <div class="eq-line"></div>
    </div>
    <form class="answer-form" id="answer-form" onsubmit="return false;">
      <input
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        class="answer-input"
        id="answer-input"
        placeholder="?"
        autocomplete="off"
        min="0"
        max="9999"
      >
      <button type="submit" class="submit-btn" id="submit-btn">Check!</button>
    </form>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen hidden">
    <div class="result-title" id="result-title">Nice Work!</div>
    <div id="pb-banner" class="pb-banner hidden">NEW PERSONAL BEST!</div>
    <div class="result-time" id="result-time">0:00</div>
    <div class="result-score" id="result-score">30 / 30 correct</div>
    <div class="result-pr" id="result-pr"></div>
    <div class="result-buttons">
      <button class="replay-btn" id="replay-btn">Play Again (same number)</button>
      <button class="choose-btn" id="choose-btn">Choose Different Number</button>
    </div>
  </div>

  <!-- Overlays -->
  <div id="flash-overlay"></div>
  <div id="feedback-text"></div>
  <div id="confetti-container"></div>

  <script>
    // ===== STATE =====
    let selectedNumber = null;
    let questions = [];
    let currentQ = 0;
    let correctCount = 0;
    let startTime = 0;
    let timerInterval = null;
    let feedbackActive = false;

    const TOTAL_QUESTIONS = 30;

    // ===== DOM REFS =====
    const screenSelect  = document.getElementById('screen-select');
    const screenPlaying = document.getElementById('screen-playing');
    const screenResult  = document.getElementById('screen-result');

    const numberGrid     = document.getElementById('number-grid');
    const prDisplay      = document.getElementById('pr-display');
    const startBtn       = document.getElementById('start-btn');

    const progressBar    = document.getElementById('progress-bar');
    const questionCounter= document.getElementById('question-counter');
    const timerDisplay   = document.getElementById('timer-display');
    const eqTop          = document.getElementById('eq-top');
    const eqBottomNum    = document.getElementById('eq-bottom-num');
    const answerInput    = document.getElementById('answer-input');
    const answerForm     = document.getElementById('answer-form');

    const resultTitle    = document.getElementById('result-title');
    const pbBanner       = document.getElementById('pb-banner');
    const resultTime     = document.getElementById('result-time');
    const resultScore    = document.getElementById('result-score');
    const resultPr       = document.getElementById('result-pr');
    const replayBtn      = document.getElementById('replay-btn');
    const chooseBtn      = document.getElementById('choose-btn');

    const flashOverlay   = document.getElementById('flash-overlay');
    const feedbackText   = document.getElementById('feedback-text');
    const confettiCont   = document.getElementById('confetti-container');

    // ===== UTILS =====
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60);
      const sec = totalSec % 60;
      return `${min}:${sec.toString().padStart(2, '0')}`;
    }

    function getPR(n) {
      const val = localStorage.getItem(`samarth_pr_${n}`);
      return val ? parseInt(val, 10) : null;
    }

    function savePR(n, ms) {
      localStorage.setItem(`samarth_pr_${n}`, ms);
    }

    function updatePRDisplay(n) {
      const pr = getPR(n);
      if (pr) {
        prDisplay.textContent = `Your best for ${n}s: ${formatTime(pr)}`;
      } else {
        prDisplay.textContent = `No record yet for ${n}s — go set one!`;
      }
    }

    // ===== QUESTION GENERATION =====
    function generateQuestions(n) {
      let pool = [];
      for (let pass = 0; pass < 2; pass++) {
        let round = Array.from({ length: 12 }, (_, i) => i + 1);
        shuffle(round);
        pool.push(...round);
      }
      for (let i = 0; i < 6; i++) {
        pool.push(Math.floor(Math.random() * 12) + 1);
      }
      return pool.map(m => ({ top: n, bottom: m, answer: n * m }));
    }

    // ===== SELECT SCREEN =====
    for (let i = 1; i <= 12; i++) {
      const btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.textContent = i;
      btn.addEventListener('click', () => selectNumber(i));
      numberGrid.appendChild(btn);
    }

    function selectNumber(n) {
      selectedNumber = n;
      document.querySelectorAll('.num-btn').forEach((btn, idx) => {
        btn.classList.toggle('selected', idx + 1 === n);
      });
      startBtn.disabled = false;
      updatePRDisplay(n);
    }

    startBtn.addEventListener('click', startGame);

    // ===== START GAME =====
    function startGame() {
      if (!selectedNumber) return;
      questions = generateQuestions(selectedNumber);
      currentQ = 0;
      correctCount = 0;
      feedbackActive = false;

      showScreen(screenPlaying);
      startTime = Date.now();
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 100);

      loadQuestion();
      answerInput.focus();
    }

    function showScreen(screen) {
      screenSelect.classList.add('hidden');
      screenPlaying.classList.add('hidden');
      screenResult.classList.add('hidden');
      screen.classList.remove('hidden');
    }

    // ===== PLAYING =====
    function updateTimer() {
      const elapsed = Date.now() - startTime;
      timerDisplay.textContent = formatTime(elapsed);
    }

    function loadQuestion() {
      const q = questions[currentQ];
      eqTop.textContent = q.top;
      eqBottomNum.textContent = q.bottom;
      answerInput.value = '';
      questionCounter.textContent = `Question ${currentQ + 1} / ${TOTAL_QUESTIONS}`;
      progressBar.style.width = `${(currentQ / TOTAL_QUESTIONS) * 100}%`;
      answerInput.focus();
    }

    answerForm.addEventListener('submit', handleSubmit);
    document.getElementById('submit-btn').addEventListener('click', handleSubmit);

    function handleSubmit() {
      if (feedbackActive) return;
      const raw = answerInput.value.trim();
      if (raw === '') return;
      const userAnswer = parseInt(raw, 10);
      if (isNaN(userAnswer)) return;

      const correct = questions[currentQ].answer;
      const isCorrect = userAnswer === correct;

      if (isCorrect) correctCount++;
      showFeedback(isCorrect, correct);
    }

    function showFeedback(isCorrect, correctAnswer) {
      feedbackActive = true;

      if (isCorrect) {
        flashOverlay.className = 'correct';
        flashOverlay.style.opacity = '1';
        feedbackText.textContent = '\u2b50 Correct!';
        feedbackText.style.color = '#00ff88';
        feedbackText.style.opacity = '1';
      } else {
        flashOverlay.className = 'wrong';
        flashOverlay.style.opacity = '1';
        feedbackText.textContent = `Answer was ${correctAnswer}`;
        feedbackText.style.color = '#ff6666';
        feedbackText.style.opacity = '1';
      }

      setTimeout(() => {
        flashOverlay.style.opacity = '0';
        feedbackText.style.opacity = '0';
        setTimeout(() => {
          flashOverlay.className = '';
          feedbackActive = false;
          advance();
        }, 150);
      }, 800);
    }

    function advance() {
      currentQ++;
      if (currentQ >= TOTAL_QUESTIONS) {
        finishGame();
      } else {
        loadQuestion();
      }
    }

    // ===== FINISH =====
    function finishGame() {
      clearInterval(timerInterval);
      const elapsed = Date.now() - startTime;

      progressBar.style.width = '100%';

      const pr = getPR(selectedNumber);
      let isNewPB = false;

      if (!pr || elapsed < pr) {
        savePR(selectedNumber, elapsed);
        isNewPB = true;
      }

      // Show result screen
      showScreen(screenResult);

      resultTime.textContent = formatTime(elapsed);
      resultScore.textContent = `${correctCount} / ${TOTAL_QUESTIONS} correct`;

      if (isNewPB && pr === null) {
        resultTitle.textContent = 'First Record!';
        pbBanner.classList.remove('hidden');
        pbBanner.textContent = 'NEW RECORD! \uD83C\uDF89';
        resultPr.textContent = '';
        launchCelebration();
      } else if (isNewPB) {
        resultTitle.textContent = 'AMAZING!';
        pbBanner.classList.remove('hidden');
        pbBanner.textContent = 'NEW PERSONAL BEST!';
        resultPr.textContent = '';
        launchCelebration();
      } else {
        resultTitle.textContent = 'Nice Work!';
        pbBanner.classList.add('hidden');
        resultPr.textContent = pr ? `Your best: ${formatTime(pr)} \u2014 Keep going!` : '';
      }
    }

    // ===== RESULT BUTTONS =====
    replayBtn.addEventListener('click', () => {
      pbBanner.classList.add('hidden');
      confettiCont.innerHTML = '';
      startGame();
    });

    chooseBtn.addEventListener('click', () => {
      pbBanner.classList.add('hidden');
      confettiCont.innerHTML = '';
      showScreen(screenSelect);
      if (selectedNumber) updatePRDisplay(selectedNumber);
    });

    // ===== CELEBRATION =====
    const CONFETTI_COLORS = [
      '#ff3b3b','#ff7c00','#ffd700','#00e676','#00e5ff',
      '#2979ff','#aa00ff','#f50057','#76ff03','#ff6d00'
    ];

    function launchCelebration() {
      confettiCont.innerHTML = '';

      // Confetti particles
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-particle';
        const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        const x = Math.random() * 100;
        const duration = 2.0 + Math.random() * 1.5;
        const delay = Math.random() * 0.8;
        const size = 8 + Math.random() * 10;
        p.style.cssText = `
          left: ${x}%;
          top: -20px;
          width: ${size}px;
          height: ${size}px;
          background: ${color};
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        `;
        confettiCont.appendChild(p);
      }

      // Star bursts at random positions
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'star-burst';
        s.textContent = '\u2b50';
        const x = 15 + Math.random() * 70;
        const y = 15 + Math.random() * 70;
        const delay = Math.random() * 1.2;
        const duration = 1.0 + Math.random() * 0.8;
        s.style.cssText = `
          left: ${x}%;
          top: ${y}%;
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
          font-size: ${18 + Math.random() * 20}px;
        `;
        confettiCont.appendChild(s);
      }

      // Clean up after 4s
      setTimeout(() => {
        confettiCont.innerHTML = '';
      }, 4000);
    }

    // Allow Enter key on input
    answerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSubmit();
      }
    });
  </script>
</body>
</html>
