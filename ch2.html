<!DOCTYPE html>
<html>
<head>
<title>Turbo Time Turtle 2000 — Chapter 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { box-sizing: border-box; touch-action: none; }
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; overflow: hidden; }
  #game-wrapper { position: relative; }
  canvas { display: block; border: 2px solid #444; max-width: 100%; }
  #touch-controls { display: none; width: 100%; max-width: 800px; background: #111; padding: 8px 16px; }
  @media (pointer: coarse) { #touch-controls { display: flex; justify-content: space-between; align-items: center; } }
  #dpad { display: grid; grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px 44px; gap: 4px; }
  .dpad-btn { background: #222; border: 2px solid #444; border-radius: 8px; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .dpad-btn:active { background: #444; }
  #dpad-empty { background: transparent; border: none; }
  #btn-e { width: 80px; height: 80px; border-radius: 50%; background: #1a1a3a; border: 3px solid #7c4dff; color: #7c4dff; font-size: 22px; font-weight: bold; font-family: monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; }
  #btn-e:active { background: #2a2a5a; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game" width="800" height="600"></canvas>
</div>
<div id="touch-controls">
  <div id="dpad">
    <div></div><div class="dpad-btn" id="btn-up">▲</div><div></div>
    <div class="dpad-btn" id="btn-left">◀</div><div id="dpad-empty"></div><div class="dpad-btn" id="btn-right">▶</div>
    <div></div><div class="dpad-btn" id="btn-down">▼</div><div></div>
  </div>
  <div id="btn-e">E</div>
</div>

<script>
// ── CANVAS RESIZE ─────────────────────────────────────────────
function resizeCanvas() {
  const ctrl = document.getElementById('touch-controls');
  const mob = window.matchMedia('(pointer: coarse)').matches;
  const ch = mob ? (ctrl.offsetHeight || 120) : 0;
  const s = Math.min(window.innerWidth / 800, (window.innerHeight - ch) / 600);
  const c = document.getElementById('game');
  c.style.width = Math.floor(800 * s) + 'px';
  c.style.height = Math.floor(600 * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>

<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

// ── INPUT ─────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

function touchKey(k, d) { keys[k] = d; }
function bindTouch(id, key) {
  const el = document.getElementById(id); if (!el) return;
  el.addEventListener('touchstart',  e => { e.preventDefault(); touchKey(key, true);  }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('mousedown',   () => touchKey(key, true));
  el.addEventListener('mouseup',     () => touchKey(key, false));
  el.addEventListener('mouseleave',  () => touchKey(key, false));
}
bindTouch('btn-up','ArrowUp'); bindTouch('btn-down','ArrowDown');
bindTouch('btn-left','ArrowLeft'); bindTouch('btn-right','ArrowRight');
bindTouch('btn-e','e');
canvas.addEventListener('touchend', e => { e.preventDefault(); if (dlgActive) advanceDlg(); }, { passive: false });

// ── GLOBAL STATE ──────────────────────────────────────────────
let scene       = 'title';
let ticker      = 0;
let eDown       = false;   // edge-detected E press
let sceneLabel  = 0;       // frames to show "▼ YOU" label

// Dialogue
let dlgActive = false, dlgLines = [], dlgPage = 0, dlgCb = null;

// Eric — the player character (big enough to see!)
const E = { x: 380, y: 260, w: 40, h: 56, spd: 3 };

// Nathan follows Eric
const N = { x: 200, y: 260, w: 36, h: 52 };

// ── SCENE STATE ───────────────────────────────────────────────
// Title
let titleT = 0;

// Home
let partyDone  = { boombox: false, skate: false, bath: false, junk: false };
let partyCount = 0;
let phonePhase = 'off'; // off | ringing | done

// Nathan scene
let natPhase = 'talk'; // talk | ready

// Warp
let warpT = 0;

// City
let cityPhase = 'explore'; // explore | noted | done
let glitchT   = 0;
const CARS = [
  { x:-80, y:190, w:64,h:22, spd:2.4, col:'#e53935' },
  { x: 350, y:155, w:56,h:18, spd:3.1, col:'#1e88e5' },
  { x: 820, y:215, w:60,h:20, spd:-2.6, col:'#fdd835' },
  { x:-120, y:370, w:58,h:20, spd:2.0, col:'#43a047' },
];

// Warehouse
let whPhase = 'pre';     // pre | rps | rps_r | test | done
let myRPS   = null, natRPS = null, rpsRes = null, rpsT = 0;
let testE = false, testN = false;

// Search
let srchPhase = 'walk'; // walk | taps | reveal
let tapT = 0, tapCount = 0, tapFlash = 0;

// Battle
let btPhase = 'fight';
let eHP = 100, lHP = 100;
let mash = 0, flash = 0, lAtkT = 80, btT = 0;

// Bark / black hole
let bkPhase = 'grow';
let bkT = 0, dogSz = 1, holeR = 0, suckX = 600;

// Home end / cert
let certT = 0, certA = 0, certPhase = 'show';

// Epilogue
let ep2T = 0, watchA = 0, ep2TextA = 0, ep2Ph = 'dark';

// ── LAYOUT ───────────────────────────────────────────────────
// All interactive world objects
const OBJ = {
  // Home
  boombox:  { x:80,  y:170, w:58, h:38 },
  skate:    { x:680, y:200, w:50, h:18 },
  tub:      { x:300, y:100, w:90, h:60 },
  junk:     { x:560, y:360, w:60, h:50 },
  phone:    { x:200, y:400, w:34, h:40 },
  couch:    { x:80,  y:350, w:140,h:60 },
  tableH:   { x:340, y:400, w:110,h:45 },
  // Warehouse
  bag1:     { x:190, y:240, w:56, h:100 },
  bag2:     { x:480, y:240, w:56, h:100 },
  dusty:    { x:680, y:360, w:44, h:34 },
  // City
  wh:       { x:630, y:60,  w:150,h:220 },
  glitch:   { x:555, y:240, w:30, h:50  },
};

const CITY_BLDG = [
  {x:0,  y:0,  w:110,h:200},{x:150,y:0,  w:100,h:165},
  {x:320,y:0,  w:130,h:185},{x:530,y:0,  w:100,h:170},
  {x:0,  y:430,w:130,h:170},{x:200,y:450,w:110,h:150},
  {x:400,y:445,w:120,h:155},
];
const WH_CRATES = [
  {x:50, y:50, w:75,h:70},{x:180,y:50, w:65,h:65},{x:305,y:50, w:75,h:70},
  {x:450,y:50, w:65,h:65},{x:580,y:40, w:90,h:80},{x:680,y:50, w:100,h:85},
  {x:50, y:370,w:75,h:75},{x:185,y:400,w:65,h:65},{x:440,y:385,w:75,h:75},
];

// ── HELPERS ───────────────────────────────────────────────────
function dlg(lines, cb) {
  dlgLines = lines; dlgPage = 0; dlgActive = true; dlgCb = cb || null;
}
function advanceDlg() {
  dlgPage++;
  if (dlgPage >= dlgLines.length) {
    dlgActive = false;
    const cb = dlgCb; dlgCb = null;
    if (cb) cb();
  }
}

function distC(a, b) {
  return Math.hypot((a.x+a.w/2) - (b.x+b.w/2), (a.y+a.h/2) - (b.y+b.h/2));
}
function near(a, b, d) { return distC(a, b) < d; }

function collide(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function moveE(obs) {
  let dx=0, dy=0;
  if (keys['ArrowLeft'] ||keys['a']||keys['A']) dx = -E.spd;
  if (keys['ArrowRight']||keys['d']||keys['D']) dx =  E.spd;
  if (keys['ArrowUp']   ||keys['w']||keys['W']) dy = -E.spd;
  if (keys['ArrowDown'] ||keys['s']||keys['S']) dy =  E.spd;
  let nx = Math.max(4,  Math.min(756, E.x + dx));
  let ny = Math.max(60, Math.min(390, E.y + dy));   // stay above dialogue box
  for (const o of obs) { if (collide(nx,E.y,E.w,E.h,o.x,o.y,o.w,o.h)) nx = E.x; }
  for (const o of obs) { if (collide(E.x,ny,E.w,E.h,o.x,o.y,o.w,o.h)) ny = E.y; }
  E.x = nx; E.y = ny;
}

// ── UPDATE ────────────────────────────────────────────────────
function update() {
  ticker++;
  if (sceneLabel > 0) sceneLabel--;

  // Dialogue handles E
  if (dlgActive) {
    const ed = keys['e']||keys['E']||keys[' '];
    if (ed && !eDown) advanceDlg();
    eDown = ed; return;
  }
  eDown = false;

  if (scene==='title')    uTitle();
  if (scene==='home')     uHome();
  if (scene==='nathan')   uNathan();
  if (scene==='warp')     uWarp();
  if (scene==='city')     uCity();
  if (scene==='warehouse')uWarehouse();
  if (scene==='search')   uSearch();
  if (scene==='battle')   uBattle();
  if (scene==='bark')     uBark();
  if (scene==='homeend')  uHomeEnd();
  if (scene==='epilogue') uEpilogue();
}

// ── SCENE TRANSITIONS ─────────────────────────────────────────
function goHome() {
  scene='home'; sceneLabel=180;
  partyDone={boombox:false,skate:false,bath:false,junk:false}; partyCount=0; phonePhase='off';
  E.x=380; E.y=270;
  dlg([
    'RECAP: Eric rescued his dad Ben from year 3099.',
    '"Son," said Ben, "I have to go back to 3099."',
    '"But WHY???" said Eric.',
    '"You can\'t come to work with me. I\'ll be home at 6:30."',
    '"...Bye." "Bye!"',
    'Ben jumped in the Turbo Time Turtle 2000 — and was gone.',
    '"Well," said Eric. "Time to get this party started!"',
    '[ Move with WASD / Arrow keys.  Press E near objects to interact! ]',
  ]);
}

function goNathan() {
  scene='nathan'; sceneLabel=180; natPhase='talk';
  N.x=560; N.y=250; E.x=160; E.y=270;
  dlg([
    'A kid appeared out of NOWHERE!',
    '"You can borrow my time watch." said the kid.',
    '"W-who are you?" said Eric.',
    '"I am Nathan." said Nathan.',
    '"Your dad\'s partner. Only kid in The Time Squad..."',
    '"...and the person who left you that note." (*Chapter 1)',
    '"Oh! So it was YOU." said Eric. "Yep!" said Nathan.',
    '"Anyway — enough small talk! We\'re going to save Ben!"',
    '[ Walk to Nathan and press E to use the time watch! ]',
  ], () => { natPhase='ready'; });
}

function goWarp() { scene='warp'; warpT=0; }

function goCity() {
  scene='city'; sceneLabel=180; cityPhase='explore'; glitchT=0;
  E.x=100; E.y=290; N.x=160; N.y=295;
  dlg([
    'They landed in 3099!',
    '"Wow." said Eric. "That was weird."',
    '"Yep — if you talk while time-travelling, you say silly things."',
    '"I know. Learned that the hard way." (Sigh.)',
    'On the way they saw spilled paint, milk, and beans.',
    'And a man in a trench coat and sunglasses...',
    '[ Head to the WAREHOUSE (top-right). Watch that glitching man! ]',
  ]);
}

function goWarehouse() {
  scene='warehouse'; sceneLabel=120; whPhase='pre';
  E.x=380; E.y=300; N.x=440; N.y=305;
  dlg([
    'They went inside the warehouse.',
    'The lights were off. Everything was still.',
    '...Then — "Grr." — a quiet noise from behind!',
    '"AHHH!!! IT\'S A MONSTER!!!" screamed the boys.',
    '...They turned around only to see...',
    '...a small dog?',
    '"Dusty!" said Nathan. "Aren\'t you supposed to be at home?!"',
    '"Who is this pooch?!" said Eric, relieved.',
    'Dusty was holding something... WEAPONS!!!',
    '"He has... nunchucks? And a PICKLE?"',
    '"Those are not cool at all." said Eric.',
    '"Rock Paper Scissors — loser gets the pickle!"',
    '[ Press  1=Rock   2=Paper   3=Scissors ]',
  ], () => { whPhase='rps'; });
}

function goSearch() {
  scene='search'; sceneLabel=120; srchPhase='walk';
  tapT=0; tapCount=0; tapFlash=0;
  E.x=200; E.y=280; N.x=260; N.y=285;
  dlg([
    'Eric and Nathan went back out and kept searching.',
    '"Hmm... if I were Dad, where would I go?" said Eric.',
    'Suddenly — they felt something tap their shoulders!',
    'They looked. Nobody was there.',
    '"WHAT WAS THAT?!" said Eric.',
    '"It\'s probably our imaginations." said Nathan.',
    '"Probably" was NOT the word Eric wanted to hear.',
    '[ Walk around — something is tapping you! ]',
  ], () => { srchPhase='taps'; });
}

function goBattle() {
  scene='battle'; btPhase='fight';
  eHP=100; lHP=100; mash=0; flash=0; lAtkT=80; btT=0;
  dlg([
    '⚔  BATTLE!  ⚔',
    'Lord Time is too powerful for normal attacks...',
    'but fight back anyway! Mash E to attack!',
    '[ MASH E to hit! ]',
  ]);
}

function goBark() { scene='bark'; bkPhase='grow'; bkT=0; dogSz=1; holeR=0; suckX=600; }

function goHomeEnd() {
  scene='homeend'; certT=0; certA=0; certPhase='show';
  E.x=260; E.y=300;
}

function goEpilogue() {
  scene='epilogue'; ep2T=0; watchA=0; ep2TextA=0; ep2Ph='dark';
}

// ── SCENE UPDATES ─────────────────────────────────────────────
function uTitle() {
  titleT++;
  const ed = keys['e']||keys['E']||keys[' '];
  if ((ed && !eDown) || titleT > 360) { eDown=true; goHome(); }
}

// ── HOME ──────────────────────────────────────────────────────
function uHome() {
  moveE([OBJ.couch, OBJ.tableH]);

  const items = [
    { key:'boombox', obj:OBJ.boombox, hint:'Boombox', lines:[
      'Eric cranked the boombox to MAX volume!',
      '♪  Bruno Mars — Uptown Funk  ♫',
      '♪  24K Magic  ♫',
      '♪  Just the Way You Are  ♫',
    ]},
    { key:'skate', obj:OBJ.skate, hint:'Skateboard', lines:[
      'Eric started skateboarding in the house!',
      'WHEEE!!!',
      'He ollied over the couch. Three times.',
    ]},
    { key:'bath', obj:OBJ.tub, hint:'Bubble Bath', lines:[
      'Eric took a fun bubble bath!',
      'He gave himself SEVENTEEN bubble beards.',
      '...and a bubble top hat.',
    ]},
    { key:'junk', obj:OBJ.junk, hint:'Junk Food', lines:[
      'Eric ate a HUGE pile of junk food!',
      'Chips, cookies, candy, soda...',
      '...and then he found a hidden stash of gummies.',
    ]},
  ];

  if (phonePhase === 'off') {
    for (const item of items) {
      if (!partyDone[item.key] && near(E, item.obj, 72)) {
        if (keys['e']||keys['E']) {
          eDown=true;
          dlg(item.lines, () => {
            partyDone[item.key]=true; partyCount++;
            if (partyCount===4) {
              dlg([
                'Eric partied ALL afternoon!',
                'Just then — BRING! BRING! — the phone rang!',
                'Eric quickly vacuumed the mess. VRRR!!!',
                'Fortunately Eric is a VERY fast cleaner.',
                '[ Walk to the PHONE and press E to answer! ]',
              ]);
              phonePhase='ringing';
            }
          });
          break;
        }
      }
    }
  }

  if (phonePhase === 'ringing' && near(E, OBJ.phone, 72)) {
    if (keys['e']||keys['E']) {
      eDown=true; phonePhase='done';
      dlg([
        'RING RING!  Eric answered the phone.',
        '[Hello Eric! It\'s 6:25 — I\'ll be home soon!]',
        '"Oh. Okay, bye, Dad." [Bye!] Click.',
        'Eric waited. 6:30... nothing.',
        '"He probably got snacks from a different time." said Eric.',
        '...Still nothing. An hour. Another hour.',
        '"This is not good." said Eric. "NOT GOOD AT ALL."',
        'Just then — a kid appeared out of NOWHERE!',
      ], () => { goNathan(); });
    }
  }
}

// ── NATHAN ────────────────────────────────────────────────────
function uNathan() {
  moveE([]);
  N.x += (E.x+60-N.x)*0.05; N.y += (E.y-N.y)*0.05;
  if (natPhase==='ready' && near(E,N,80)) {
    if (keys['e']||keys['E']) {
      eDown=true;
      dlg([
        'They looked at the time watch and entered: 3-0-9-9.',
        'Energy started swirling around their bodies!',
        '"I\'m jealous," said Eric. "This is better than bananas."',
        '"What. Ha ha." said Nathan.',
        '...There was a flash of light, and they were gone.',
      ], () => { goWarp(); });
    }
  }
}

// ── WARP ──────────────────────────────────────────────────────
function uWarp() { warpT++; if (warpT>220) goCity(); }

// ── CITY ──────────────────────────────────────────────────────
function uCity() {
  for (const c of CARS) {
    c.x += c.spd;
    if (c.spd>0 && c.x>860) c.x=-90;
    if (c.spd<0 && c.x<-90) c.x=860;
  }
  moveE(CITY_BLDG);
  N.x += (E.x-50-N.x)*0.06; N.y += (E.y-N.y)*0.06;
  glitchT++;

  // Glitch man
  const gv = Math.sin(glitchT*0.07)>0.25 && glitchT>80;
  if (cityPhase==='explore' && gv && near(E, OBJ.glitch, 100)) {
    if (keys['e']||keys['E']) {
      eDown=true; cityPhase='noted';
      dlg([
        '"Something seems suspicious about that guy." said Eric.',
        '"What do you mean?" said Nathan.',
        '"He\'s GLITCHING — like an old video game!"',
        '...The man stopped glitching the instant Nathan looked.',
        '"I don\'t see anything." said Nathan.',
        '"Maybe it was just your imagination." suggested Nathan.',
        '"But I swear I— (Sigh.) Whatever. Let\'s keep moving."',
        '[ Head to the WAREHOUSE — top right! ]',
      ]);
    }
  }

  // Warehouse entrance
  if (near(E, OBJ.wh, 90)) {
    if (keys['e']||keys['E']) { eDown=true; goWarehouse(); }
  }
}

// ── WAREHOUSE ─────────────────────────────────────────────────
function uWarehouse() {
  if (whPhase==='pre') return;

  if (whPhase==='rps') {
    if (keys['1'] && !eDown) { eDown=true; doRPS('rock'); }
    else if (keys['2'] && !eDown) { eDown=true; doRPS('paper'); }
    else if (keys['3'] && !eDown) { eDown=true; doRPS('scissors'); }
    return;
  }

  if (whPhase==='rps_r') {
    rpsT++;
    if (rpsT>70 && (keys['e']||keys['E']||keys[' ']) && !eDown) {
      eDown=true;
      dlg([
        rpsRes==='win' ? '"Nice!" said Nathan. He takes the pickle reluctantly.' :
        rpsRes==='lose'? '"What?!" said Nathan. "(Sigh) I get the pickle."' :
                         'TIE! They played again... Nathan still lost.',
        '"Okay," said Eric. "Let\'s test these things!"',
        'They got two BIG punching bags.',
        '[ Press E near YOUR bag (left)  then near NATHAN\'s bag (right) ]',
      ], () => { whPhase='test'; testE=false; testN=false; });
    }
    return;
  }

  if (whPhase==='test') {
    moveE([]);
    if (!testE && near(E, OBJ.bag1, 80)) {
      if (keys['e']||keys['E']) {
        eDown=true; testE=true;
        dlg(['Swish swish! ZAP! Eric smashes the bag in one hit!','"WHOA!" said Eric. The nunchucks crackle with energy.'], checkWeapons);
      }
    }
    if (!testN && near(E, OBJ.bag2, 80)) {
      if (keys['e']||keys['E']) {
        eDown=true; testN=true;
        dlg(['Smack! RIP! Nathan\'s pickle slices the bag clean through!','"Cool!" said Nathan. "But overall, you got the cooler weapon."'], checkWeapons);
      }
    }
    return;
  }

  if (whPhase==='done') {
    moveE([]);
    if (keys['e']||keys['E']) { eDown=true; goSearch(); }
  }
}

function doRPS(choice) {
  myRPS = choice;
  const opts=['rock','paper','scissors'];
  natRPS = opts[Math.floor(Math.random()*3)];
  if (myRPS===natRPS) rpsRes='tie';
  else if ((myRPS==='rock'&&natRPS==='scissors')||(myRPS==='paper'&&natRPS==='rock')||(myRPS==='scissors'&&natRPS==='paper')) rpsRes='win';
  else rpsRes='lose';
  whPhase='rps_r'; rpsT=0;
}
function checkWeapons() { if (testE && testN) whPhase='done'; }

// ── SEARCH ────────────────────────────────────────────────────
function uSearch() {
  moveE([]);
  N.x += (E.x-50-N.x)*0.06; N.y += (E.y-N.y)*0.06;
  if (tapFlash>0) tapFlash--;

  if (srchPhase==='taps') {
    tapT++;
    if (tapT%90===0 && tapCount<5) { tapCount++; tapFlash=28; }
    if (tapCount>=5) {
      srchPhase='reveal';
      dlg([
        '"Wait a minute!" said Eric.',
        'GASP! ...It was LORD TIME!',
        'Carrying an axe — and a tied-up, bruised BEN!',
        '"But how?! You\'re supposed to be DEAD!" said Eric.',
        '"I had the EDM in my scepter. Flipped it upside-down."',
        '"Instead of destroying me, it REGENERATED me — with new powers!"',
        '"Also... I was that glitching man you saw."',
        '"WAIT WHAT?!" said Nathan. "I was wrong?!"',
        '"HA! \'It was just your imagination!\'" mocked Eric.',
        '"Anyway," said Lord Time. "Time for Ben\'s death!"',
        '"NOT IF WE CAN HELP IT!" said our heroes.',
        '⚔  FIGHT!!!',
      ], () => { goBattle(); });
    }
  }
}

// ── BATTLE ────────────────────────────────────────────────────
function uBattle() {
  btT++; if (flash>0) flash--;
  if (btPhase!=='fight') return;

  // Eric attacks with E
  if ((keys['e']||keys['E']) && !eDown) {
    mash++; lHP=Math.max(20,lHP-7); flash=8; eDown=true;
  }

  // Lord Time attacks
  lAtkT--;
  if (lAtkT<=0) {
    eHP=Math.max(0,eHP-14); flash=12;
    lAtkT=Math.max(22,80-Math.floor(btT/6));
  }

  // Lord Time can't die (min 20%)
  if (eHP<=0||btT>480) {
    btPhase='lost';
    dlg([
      'Lord Time is too strong — you lost the battle!',
      '"What are we going to do?!" said Eric.',

// ── EPILOGUE ──────────────────────────────────────────────────
function uEpilogue() {
  ep2T++;

  if (ep2Ph==='watcher') { watchA=Math.min(0.9,ep2T/90); if (ep2T>130) { ep2Ph='text'; ep2T=0; } }

// ── DRAW ──────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,800,600);
  ctx.textAlign='left';

  if (scene==='title')    dTitle();
  if (scene==='home')     dHome();
  if (scene==='nathan')   dNathanScene();
  if (scene==='warp')     dWarp();
  if (scene==='city')     dCity();
  if (scene==='warehouse')dWarehouse();
  if (scene==='search')   dSearch();
  if (scene==='battle')   dBattle();
  if (scene==='bark')     dBark();
  if (scene==='homeend')  dHomeEnd();
  if (scene==='epilogue') dEpilogue();

  dDialogue();
  dControls();
}

  function loop() {
    mel.forEach(([f,b])=>note(f,b*B,B*0.65,'square',0.035));
    bass.forEach((f,i)=>note(f,i*B*4,B*3.3,'triangle',0.055));
    setTimeout(loop,32*B*1000*0.96);
  }
  const go=()=>{ if(ac.state==='suspended') ac.resume(); loop(); };
  document.addEventListener('keydown',go,{once:true});
  canvas.addEventListener('touchstart',go,{once:true,passive:true});
})();

// ── GAME LOOP ─────────────────────────────────────────────────
(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
