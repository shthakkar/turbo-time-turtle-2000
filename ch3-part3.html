<!DOCTYPE html>
<html>
<head>
<title>Turbo Time Turtle 2000 — Chapter 3, Part 3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { box-sizing: border-box; touch-action: none; }
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; overflow: hidden; }
  #game-wrapper { position: relative; }
  canvas { display: block; border: 2px solid #444; max-width: 100%; }
  #touch-controls { display: none; width: 100%; max-width: 800px; background: #111; padding: 8px 16px; }
  @media (pointer: coarse) { #touch-controls { display: flex; justify-content: space-between; align-items: center; } }
  #dpad { display: grid; grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px 44px; gap: 4px; }
  .dpad-btn { background: #222; border: 2px solid #444; border-radius: 8px; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .dpad-btn:active { background: #444; }
  #dpad-empty { background: transparent; border: none; }
  #btn-e { width: 80px; height: 80px; border-radius: 50%; background: #1a1a3a; border: 3px solid #7c4dff; color: #7c4dff; font-size: 22px; font-weight: bold; font-family: monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; }
  #btn-e:active { background: #2a2a5a; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game" width="800" height="600"></canvas>
</div>
<div id="touch-controls">
  <div id="dpad">
    <div></div><div class="dpad-btn" id="btn-up">▲</div><div></div>
    <div class="dpad-btn" id="btn-left">◀</div><div id="dpad-empty"></div><div class="dpad-btn" id="btn-right">▶</div>
    <div></div><div class="dpad-btn" id="btn-down">▼</div><div></div>
  </div>
  <div id="btn-e">E</div>
</div>

<script>
function resizeCanvas() {
  const ctrl = document.getElementById('touch-controls');
  const mob = window.matchMedia('(pointer: coarse)').matches;
  const ch = mob ? (ctrl.offsetHeight || 120) : 0;
  const s = Math.min(window.innerWidth / 800, (window.innerHeight - ch) / 600);
  const c = document.getElementById('game');
  c.style.width = Math.floor(800 * s) + 'px';
  c.style.height = Math.floor(600 * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>

<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

function touchKey(k, d) { keys[k] = d; }
function bindTouch(id, key) {
  const el = document.getElementById(id); if (!el) return;
  el.addEventListener('touchstart',  e => { e.preventDefault(); touchKey(key, true);  }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); touchKey(key, false); }, { passive: false });
  el.addEventListener('mousedown',   () => touchKey(key, true));
  el.addEventListener('mouseup',     () => touchKey(key, false));
  el.addEventListener('mouseleave',  () => touchKey(key, false));
}
bindTouch('btn-up','ArrowUp'); bindTouch('btn-down','ArrowDown');
bindTouch('btn-left','ArrowLeft'); bindTouch('btn-right','ArrowRight');
bindTouch('btn-e','e');
canvas.addEventListener('touchend', e => { e.preventDefault(); if (dlgActive) advanceDlg(); }, { passive: false });

// ── STATE ─────────────────────────────────────────────────────
let scene = 'title', ticker = 0, eDown = false, sceneLabel = 0;
let dlgActive = false, dlgLines = [], dlgPage = 0, dlgCb = null;

const E = { x: 380, y: 260, w: 40, h: 56, spd: 3 };
const N = { x: 320, y: 265, w: 36, h: 52 };

// ── SCENE STATE ───────────────────────────────────────────────
let titleT = 0;

// isle_explore
let explorePhase = 'walk'; // walk | done
let exploreT = 0;
const OBJ_SIGN      = { x: 560, y: 180, w: 130, h: 70 };
const OBJ_TVSHOP    = { x: 60,  y: 100, w: 160, h: 200 };
let signRead = false, shopNear = false;

// tv_shop
let tvPhase = 'enter'; // enter | scream | off | restart | news
let tvT = 0;
const OBJ_TV    = { x: 320, y: 160, w: 120, h: 90 };
const OBJ_TVBTN = { x: 500, y: 220, w: 80,  h: 40 };
let tvOn = false, tvScream = false, newsShown = false;

// bus_lady
let busPhase  = 'look'; // look | bus | lady
let busT = 0;
let busX = -120;
const OBJ_CURB = { x: 340, y: 280, w: 80, h: 30 };
let ladySeen = false;

// street_cross
let crossPhase = 'watch'; // watch | vanish | sniff
let crossT = 0;
let ladyX = 760, ladyAlpha = 1;

// rat_follow
let ratPhase = 'sniff'; // sniff | follow
let ratX = 600, ratY = 300, ratT = 0;
const OBJ_RAT = { x: 600, y: 300, w: 24, h: 14 };

// pipe_enter
let pipePhase = 'walk'; // walk | enter
let pipeT = 0;
const OBJ_PIPE = { x: 660, y: 250, w: 70, h: 90 };

// continue
let continueT = 0;

// ── HELPERS ───────────────────────────────────────────────────
function dlg(lines, cb) {
  dlgLines = lines; dlgPage = 0; dlgActive = true; dlgCb = cb || null;
}
function advanceDlg() {
  dlgPage++;
  if (dlgPage >= dlgLines.length) {
    dlgActive = false;
    const cb = dlgCb; dlgCb = null;
    if (cb) cb();
  }
}
function distC(a, b) {
  return Math.hypot((a.x+a.w/2)-(b.x+b.w/2),(a.y+a.h/2)-(b.y+b.h/2));
}
function near(a, b, d) { return distC(a,b) < d; }
function collide(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function moveE(obs) {
  let dx=0,dy=0;
  if (keys['ArrowLeft']||keys['a']||keys['A']) dx=-E.spd;
  if (keys['ArrowRight']||keys['d']||keys['D']) dx= E.spd;
  if (keys['ArrowUp']||keys['w']||keys['W'])    dy=-E.spd;
  if (keys['ArrowDown']||keys['s']||keys['S'])  dy= E.spd;
  let nx=Math.max(4,Math.min(756,E.x+dx));
  let ny=Math.max(60,Math.min(390,E.y+dy));
  for (const o of obs) { if(collide(nx,E.y,E.w,E.h,o.x,o.y,o.w,o.h)) nx=E.x; }
  for (const o of obs) { if(collide(E.x,ny,E.w,E.h,o.x,o.y,o.w,o.h)) ny=E.y; }
  E.x=nx; E.y=ny;
}

// ── TRANSITIONS ───────────────────────────────────────────────
function goExplore() {
  scene='isle_explore'; explorePhase='walk'; exploreT=0; sceneLabel=180;
  E.x=100; E.y=300; N.x=160; N.y=305;
  dlg([
    'Masks on, they stepped outside to explore.',
    'The Lost Isle was... oddly normal-looking.',
    'Except for the green air. And the silence.',
    '"No birds." said Nathan. "That\'s weird."',
    '"Everything about this place is weird." said Eric.',
    'Seymour stayed back at the house. "You don\'t need me."',
    '"We might need you!" said Eric.',
    '"You\'ll be fine." said Seymour, drinking his coffee.',
    '[ Explore the isle. Check out that sign, and the TV shop! ]',
  ]);
}
function goTvShop() {
  scene='tv_shop'; tvPhase='enter'; tvT=0; tvOn=false; tvScream=false; newsShown=false;
  E.x=200; E.y=280; N.x=260; N.y=285;
  dlg([
    'The TV shop was strange.',
    'Every single TV was switched off.',
    'But the shelves were neat. Like someone had been here recently.',
    '"Hello?" called Eric. Nobody answered.',
    '"Check around." said Nathan.',
    '[ Press E near the TV bank to try turning one on. ]',
  ], () => { tvPhase='idle'; });
}
function goBusLady() {
  scene='bus_lady'; busPhase='look'; busT=0; busX=-120; ladySeen=false;
  E.x=200; E.y=300; N.x=260; N.y=305;
  dlg([
    'They left the shop and came out onto the main road.',
    '"This whole town is abandoned." said Eric.',
    '"Not quite." said Nathan, pointing.',
    'A huge red double-decker bus rumbled in the distance.',
    '"There IS a bus. That means there are people." said Eric.',
    '"Or... one very committed bus driver." said Nathan.',
    '[ Watch the bus. Something else is coming... ]',
  ], () => { busPhase='bus'; });
}
function goStreetCross() {
  scene='street_cross'; crossPhase='watch'; crossT=0; ladyX=760; ladyAlpha=1;
  E.x=180; E.y=300; N.x=240; N.y=305;
  dlg([
    'An old lady appeared on the other side of the road.',
    'She started to cross — slowly, carefully.',
    '"Should we help her?" said Eric.',
    '"She looks fine." said Nathan.',
    'The bus rumbled past. They looked back.',
    'The old lady was... gone.',
    '"...Where did she go?!" said Eric.',
    '"She was RIGHT there!" said Nathan.',
    '"Did the bus...?" said Eric.',
    '"No. She just... vanished." said Nathan.',
    '"This is a VERY weird island." said Eric.',
  ], () => { crossPhase='vanish'; });
}
function goRatFollow() {
  scene='rat_follow'; ratPhase='sniff'; ratX=600; ratY=300; ratT=0;
  OBJ_RAT.x=600; OBJ_RAT.y=300;
  E.x=200; E.y=300; N.x=260; N.y=305;
  dlg([
    'As they stood in bewilderment, something scurried past.',
    'A rat. A large grey rat.',
    '"Ugh." said Eric.',
    '"Wait—" said Nathan, sniffing the air.',
    '"Does that rat... smell like honey? And cream?"',
    'Eric sniffed. It did.',
    '"That is a very good-smelling rat." said Eric.',
    '"Something is very wrong." said Nathan.',
    '"Follow it." said Eric.',
    '[ Follow the rat! It\'s heading somewhere... ]',
  ], () => { ratPhase='follow'; });
}
function goPipeEnter() {
  scene='pipe_enter'; pipePhase='walk'; pipeT=0;
  E.x=200; E.y=300; N.x=260; N.y=305;
  dlg([
    'The rat led them through twisting back alleys.',
    'Past a rubbish dump. Past a broken fence.',
    'Down a narrow lane that smelled even more strongly of honey.',
    '"Where is it going?" said Eric.',
    '"There." said Nathan.',
    'A large drainage pipe in the hillside.',
    'The rat squeezed inside without hesitating.',
    '"We are NOT going in there." said Eric.',
    '"The whole island is weird. The rat is our only lead." said Nathan.',
    '"Fine." said Eric. "But if there\'s a monster in there—"',
    '"There won\'t be a monster." said Nathan.',
    '[ Walk to the pipe and press E to enter! ]',
  ]);
}
function goContinue() { scene='continue'; continueT=0; }

// ── UPDATE ────────────────────────────────────────────────────
function uTitle() {
  titleT++;
  const ed=keys['e']||keys['E']||keys[' '];
  if ((ed&&!eDown)||titleT>360) { eDown=true; goExplore(); }
}

function uExplore() {
  exploreT++;
  moveE([OBJ_TVSHOP, OBJ_SIGN]);
  N.x+=(E.x-60-N.x)*0.06; N.y+=(E.y-N.y)*0.06;

  if (!signRead && near(E, OBJ_SIGN, 100)) {
    if (keys['e']||keys['E']) {
      eDown=true; signRead=true;
      dlg([
        'The sign reads: "WELCOME TO PORTSHAW"',
        '"Population: 847"',
        'Someone has crossed out 847 and written "???"',
        '"...Not ominous at all." said Eric.',
      ]);
    }
  }

  if (near(E, OBJ_TVSHOP, 100)) {
    if (keys['e']||keys['E']) { eDown=true; goTvShop(); }
  }
}

function uTvShop() {
  tvT++;
  moveE([]);
  N.x+=(E.x-60-N.x)*0.05; N.y+=(E.y-N.y)*0.05;

  if (tvPhase==='idle') {
    if (near(E, OBJ_TV, 100)) {
      if (keys['e']||keys['E']) {
        eDown=true; tvPhase='scream'; tvT=0;
        dlg([
          'Eric reached for the TV.',
          'AAAAAHHH!!!',
          'A woman burst out from behind the counter — screaming!',
          'She bolted out the back door before anyone could react.',
          '"WAIT—" said Eric. She was gone.',
          '"...Was that the shopkeeper?" said Nathan.',
          '"I think so." said Eric. "She seemed... scared?"',
          '"Of us?" said Nathan.',
          '"Maybe of something else." said Eric.',
          'The TV was still off. Eric stared at it.',
          '[ Press E on the TV to turn it on. ]',
        ], () => { tvPhase='off'; });
      }
    }
  }

  if (tvPhase==='off') {
    if (near(E, OBJ_TV, 100)) {
      if (keys['e']||keys['E']) {
        eDown=true; tvPhase='news'; tvOn=true; tvT=0;
        dlg([
          '— CLICK —',
          'The TV flickered on. LIVE NEWS.',
          '"—reports of bizarre sightings continue across Portshaw—"',
          '"—residents urged to stay indoors—"',
          '"—authorities baffled by the disappearances—"',
          '"Disappearances?!" said Eric.',
          '"People are vanishing." said Nathan quietly.',
          '"The whole island is going wrong." said Eric.',
          '"We should keep moving." said Nathan.',
          '"Agreed." said Eric.',
        ], () => { goBusLady(); });
      }
    }
  }
}

function uBusLady() {
  busT++;
  N.x+=(E.x-60-N.x)*0.05; N.y+=(E.y-N.y)*0.05;

  if (busPhase==='bus') {
    busX += 3.5;
    if (busX > 900) { busX = -200; busPhase='lady'; ladySeen=true; }
  }

  if (busPhase==='lady') {
    busT++;
    if (busT > 90) { goStreetCross(); }
  }
}

function uStreetCross() {
  crossT++;

  if (crossPhase==='watch') return; // handled by dlg cb

  if (crossPhase==='vanish') {
    ladyAlpha = Math.max(0, ladyAlpha - 0.03);
    ladyX -= 1;
    if (ladyAlpha <= 0) {
      crossPhase='sniff';
      setTimeout(() => { goRatFollow(); }, 800);
    }
  }
}

function uRatFollow() {
  ratT++;
  moveE([]);
  N.x+=(E.x-60-N.x)*0.05; N.y+=(E.y-N.y)*0.05;

  if (ratPhase==='follow') {
    // rat moves toward pipe area
    OBJ_RAT.x += (680 - OBJ_RAT.x) * 0.015;
    OBJ_RAT.y += (310 - OBJ_RAT.y) * 0.015;

    // if eric gets close to where rat is heading
    if (E.x > 560 && ratT > 120) {
      ratPhase='arrive';
      dlg([
        'The rat scurried around a corner.',
        'They followed it into a dark alley.',
        '"There!" said Nathan. "A dump — and something behind it."',
      ], () => { goPipeEnter(); });
    }
  }
}

function uPipeEnter() {
  pipeT++;
  moveE([]);
  N.x+=(E.x-60-N.x)*0.05; N.y+=(E.y-N.y)*0.05;

  if (pipePhase==='walk' && near(E, OBJ_PIPE, 90)) {
    if (keys['e']||keys['E']) {
      eDown=true; pipePhase='enter';
      dlg([
        'They squeezed into the pipe.',
        'It smelled strongly of honey. And something else.',
        '"What IS that smell?" said Eric.',
        '"Cream." said Nathan. "Definitely cream."',
        'The pipe opened up into a large underground chamber.',
        'And then they saw the shadows.',
        'Moving. Shifting. Changing shape.',
        '"Nathan." said Eric quietly. "Are you seeing this?"',
        '"Yes." said Nathan. "I am very much seeing this."',
      ], () => { goContinue(); });
    }
  }
}

function uContinue() {
  continueT++;
  const ed=keys['e']||keys['E']||keys[' '];
  if (continueT>60 && ed && !eDown) {
    window.location.href='ch3-part4.html';
  }
}

// ── SPRITES ───────────────────────────────────────────────────
function dEric(x, y, label) {
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x+20,y+58,18,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#212121'; ctx.fillRect(x+2,y+47,18,9); ctx.fillRect(x+20,y+47,18,9);
  ctx.fillStyle='#1a237e'; ctx.fillRect(x+4,y+32,15,17); ctx.fillRect(x+21,y+32,15,17);
  ctx.fillStyle='#bf360c'; ctx.fillRect(x+3,y+30,34,5);
  ctx.fillStyle='#1565c0'; ctx.fillRect(x+2,y+18,36,14);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x-5,y+18,9,18); ctx.fillRect(x+36,y+18,9,18);
  ctx.fillStyle='#ffb74d'; ctx.fillRect(x-5,y+33,9,5); ctx.fillRect(x+36,y+33,9,5);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+16,y+14,8,6);
  ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(x+20,y+12,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4e342e';
  ctx.beginPath(); ctx.arc(x+20,y+6,14,Math.PI,0); ctx.fill();
  ctx.fillRect(x+6,y,28,8);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+14,y+12,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+26,y+12,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a237e'; ctx.beginPath(); ctx.arc(x+15,y+12,2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+27,y+12,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4e342e'; ctx.fillRect(x+10,y+7,8,2); ctx.fillRect(x+22,y+7,8,2);
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x+20,y+16,4,0.15,Math.PI-0.15); ctx.stroke();
  // mask over face (green tinted)
  ctx.fillStyle='rgba(120,180,120,0.45)'; ctx.fillRect(x+6,y+9,28,12);
  ctx.strokeStyle='rgba(80,140,80,0.7)'; ctx.lineWidth=1; ctx.strokeRect(x+6,y+9,28,12);
  if (label && sceneLabel>0 && Math.floor(ticker/12)%2===0) {
    ctx.fillStyle='#ffd700'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('▼ YOU (ERIC)', x+20, y-8); ctx.textAlign='left';
  }
}

function dNathan(x, y) {
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x+18,y+53,16,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2e7d32'; ctx.fillRect(x+2,y+17,32,13);
  ctx.fillStyle='#37474f'; ctx.fillRect(x+3,y+29,13,15); ctx.fillRect(x+20,y+29,13,15);
  ctx.fillStyle='#1b5e20'; ctx.fillRect(x+2,y+44,15,8); ctx.fillRect(x+19,y+44,15,8);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x-4,y+17,8,16); ctx.fillRect(x+32,y+17,8,16);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+14,y+13,8,6);
  ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(x+18,y+11,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f9a825';
  ctx.beginPath(); ctx.arc(x+18,y+5,12,Math.PI,0); ctx.fill();
  ctx.fillRect(x+6,y,24,7);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+12,y+11,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+24,y+11,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1565c0'; ctx.beginPath(); ctx.arc(x+13,y+11,1.8,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+25,y+11,1.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f9a825'; ctx.fillRect(x+9,y+7,7,2); ctx.fillRect(x+21,y+7,7,2);
  // mask
  ctx.fillStyle='rgba(120,180,120,0.45)'; ctx.fillRect(x+4,y+8,28,11);
  ctx.strokeStyle='rgba(80,140,80,0.7)'; ctx.lineWidth=1; ctx.strokeRect(x+4,y+8,28,11);
}

// Old lady sprite
function dOldLady(x, y, alpha) {
  ctx.globalAlpha = alpha;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(x+14,y+52,13,4,0,0,Math.PI*2); ctx.fill();
  // shoes
  ctx.fillStyle='#212121'; ctx.fillRect(x+2,y+44,12,8); ctx.fillRect(x+16,y+44,12,8);
  // skirt — long, dark blue
  ctx.fillStyle='#37474f'; ctx.fillRect(x+1,y+20,26,26);
  // coat / top — purple
  ctx.fillStyle='#4a148c'; ctx.fillRect(x+2,y+12,24,12);
  // arms — hunched forward
  ctx.fillStyle='#4a148c'; ctx.fillRect(x-4,y+14,8,12); ctx.fillRect(x+24,y+14,8,12);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x-4,y+24,8,5); ctx.fillRect(x+24,y+24,8,5);
  // walking cane
  ctx.strokeStyle='#795548'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x-2,y+28); ctx.lineTo(x-6,y+50); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-8,y+50); ctx.lineTo(x-4,y+50); ctx.stroke();
  // neck
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+11,y+8,7,6);
  // head — smaller, hunched
  ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.arc(x+14,y+6,11,0,Math.PI*2); ctx.fill();
  // white fluffy hair
  ctx.fillStyle='#e0e0e0';
  ctx.beginPath(); ctx.arc(x+14,y+1,11,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(x+8,y+4,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+20,y+4,6,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(x+10,y+6,1.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+18,y+6,1.5,0,Math.PI*2); ctx.fill();
  // glasses
  ctx.strokeStyle='#555'; ctx.lineWidth=1;
  ctx.strokeRect(x+6,y+4,8,5); ctx.strokeRect(x+15,y+4,8,5);
  ctx.beginPath(); ctx.moveTo(x+14,y+6); ctx.lineTo(x+15,y+6); ctx.stroke();
  ctx.globalAlpha = 1;
}

// Large grey rat
function dRat(x, y) {
  const bob = Math.sin(ticker*0.25)*2;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(x+12,y+14+bob,12,4,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#78909c';
  ctx.beginPath(); ctx.ellipse(x+12,y+7+bob,13,7,0,0,Math.PI*2); ctx.fill();
  // head

// ── SHARED BG ─────────────────────────────────────────────────
function dIsleStreet() {
  // sickly sky
  ctx.fillStyle='#2a3a2a'; ctx.fillRect(0,0,800,600);
  const sg=ctx.createLinearGradient(0,0,0,300);
  sg.addColorStop(0,'#1a2a1a'); sg.addColorStop(1,'#2e3e2e');
  ctx.fillStyle=sg; ctx.fillRect(0,0,800,300);
  // buildings left side
  const bldgs=[
    {x:0,y:60,w:120,h:260,c:'#3e2723'},{x:130,y:100,w:100,h:220,c:'#37474f'},
    {x:550,y:80,w:110,h:240,c:'#3e2723'},{x:670,y:110,w:130,h:210,c:'#37474f'},
  ];
  bldgs.forEach(b=>{
    ctx.fillStyle=b.c; ctx.fillRect(b.x,b.y,b.w,b.h);
    // dark windows
    for (let wy=b.y+20;wy<b.y+b.h-20;wy+=30) {
      for (let wx=b.x+10;wx<b.x+b.w-10;wx+=28) {
        const lit=Math.sin(wx*13+wy*7+ticker*0.02)>0.5;
        ctx.fillStyle=lit?'rgba(255,220,100,0.25)':'#1a1a1a';
        ctx.fillRect(wx,wy,16,20);
      }
    }
  });
  // road
  ctx.fillStyle='#263238'; ctx.fillRect(0,320,800,180);
  // pavement
  ctx.fillStyle='#37474f'; ctx.fillRect(0,310,800,14);
  ctx.fillStyle='#455a64'; ctx.fillRect(0,416,800,14);
  // road markings
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=3; ctx.setLineDash([30,20]);
  ctx.beginPath(); ctx.moveTo(0,363); ctx.lineTo(800,363); ctx.stroke();
  ctx.setLineDash([]);
  // fog wisps
  for (let fi=0;fi<5;fi++) {
    const fx=(fi*180+ticker*0.4)%920-60;
    ctx.fillStyle=`rgba(120,180,80,${0.06+Math.sin(ticker*0.02+fi)*0.04})`;
    ctx.beginPath(); ctx.ellipse(fx,335,90,18,0,0,Math.PI*2); ctx.fill();
  }
}

  dRat(OBJ_PIPE.x-10, OBJ_PIPE.y+55);

  // honey smell wisps from pipe
  for (let hi=0;hi<6;hi++) {
    const hx=OBJ_PIPE.x+35+Math.sin(ticker*0.04+hi)*15;
    const hy=OBJ_PIPE.y+20-((ticker*0.5+hi*20)%60);
    const ha=0.25-((ticker*0.5+hi*20)%60)/240;
    ctx.fillStyle=`rgba(255,215,50,${ha})`;
    ctx.beginPath(); ctx.arc(hx,hy,3,0,Math.PI*2); ctx.fill();
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(8,8,200,26);
  ctx.fillStyle='#a5d6a7'; ctx.font='bold 13px monospace'; ctx.fillText('Portshaw Alley',14,27);

  dNathan(N.x,N.y);
  dEric(E.x,E.y,true);
}

function dContinueScreen() {
  ctx.fillStyle='#000811'; ctx.fillRect(0,0,800,600);
  for (let i=0;i<70;i++) {
    const sx=(i*137+50)%800, sy=(i*97+30)%580;
    ctx.fillStyle=`rgba(255,255,255,${(Math.sin(ticker*0.04+i)*0.4+0.6)*0.7})`;
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.textAlign='center';
  const pulse=(Math.sin(ticker*0.06)+1)*0.5;
  ctx.shadowColor='#00e676'; ctx.shadowBlur=20+pulse*10;
  ctx.fillStyle='#00e676'; ctx.font='bold 30px monospace';
  ctx.fillText('End of Part 3', 400, 200);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700'; ctx.font='18px monospace';
  ctx.fillText('Up next: Part 4 — Prince Time', 400, 258);
  ctx.fillStyle='#aaa'; ctx.font='14px monospace';
  ctx.fillText('The shadows in the pipe are shifting.', 400, 305);
  ctx.fillText('Something is about to reveal itself...', 400, 330);

  // shadows shifting preview
  for (let si=0;si<5;si++) {
    const sx=260+si*60+Math.sin(ticker*0.04+si)*12;
    const sy=420+Math.cos(ticker*0.05+si)*8;
    const sr=18+Math.sin(ticker*0.07+si*1.3)*6;
    const sa=0.4+Math.sin(ticker*0.06+si)*0.3;
    ctx.fillStyle=`rgba(80,0,200,${sa})`;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,215,50,0.2)'; ctx.font='13px monospace';
  ctx.fillText('~ smells like honey ~', 400, 475);

  if (continueT>60 && Math.floor(ticker/15)%2===0) {
    ctx.fillStyle='#fff'; ctx.font='bold 17px monospace';
    ctx.fillText('► Press E to continue to Part 4 ◄', 400, 535);
  }
  ctx.textAlign='left';
}

// ── DIALOGUE BOX ──────────────────────────────────────────────
function dDialogue() {
  if (!dlgActive) return;
  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(10,448,780,148);
  ctx.strokeStyle='#7c4dff'; ctx.lineWidth=2; ctx.strokeRect(10,448,780,148);
  ctx.fillStyle='#7c4dff'; ctx.fillRect(10,448,780,4);
  ctx.fillStyle='#fff'; ctx.font='16px monospace';
  const line=dlgLines[dlgPage]||'';
  const words=line.split(' ');
  let ly=480, lt='';
  for (const w of words) {
    const test=lt+(lt?' ':'')+w;
    if (ctx.measureText(test).width>740) { ctx.fillText(lt,24,ly); ly+=24; lt=w; }
    else lt=test;
  }
  if (lt) ctx.fillText(lt,24,ly);
  ctx.fillStyle='#555'; ctx.font='12px monospace';
  ctx.fillText(`${dlgPage+1}/${dlgLines.length}`,24,584);
  if (Math.floor(ticker/12)%2===0) { ctx.fillStyle='#ffd700'; ctx.font='bold 12px monospace'; ctx.textAlign='right'; ctx.fillText('E / Space ▶',780,584); ctx.textAlign='left'; }
}

function dControls() {
  if (scene==='title'||scene==='continue'||scene==='street_cross') return;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(8,8,238,26);
  ctx.fillStyle='#555'; ctx.font='12px monospace';
  ctx.fillText('Move: WASD/Arrows  |  Act: E',14,27);
}

// ── MUSIC ─────────────────────────────────────────────────────
(function() {
  let ac;
  try { ac=new (window.AudioContext||window.webkitAudioContext)(); } catch(e) { return; }
  function note(f,t,d,type,v) {
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type||'square'; o.frequency.value=f;
    g.gain.setValueAtTime(v||0.04,ac.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+d);
    o.start(ac.currentTime+t); o.stop(ac.currentTime+t+d+0.01);
  }
  const B=0.19;
  // Slower, more mysterious melody for the investigation
  const mel=[
    [294,0],[330,1],[370,2],[330,3],[294,4],[262,5],[294,6],[330,7],
    [370,8],[415,9],[440,10],[415,11],[370,12],[330,13],[294,14],[277,15],
    [294,16],[370,17],[440,18],[415,19],[370,20],[330,21],[294,22],[262,23],
    [247,24],[262,25],[294,26],[330,27],[370,28],[330,29],[294,30],[247,31],
  ];
  const bass=[147,147,165,147,165,175,165,147];
  function loop() {
    mel.forEach(([f,b])=>note(f,b*B,B*0.7,'square',0.028));
    bass.forEach((f,i)=>note(f,i*B*4,B*3.5,'triangle',0.045));
    setTimeout(loop,32*B*1000*0.96);
  }
  const go=()=>{ if(ac.state==='suspended') ac.resume(); loop(); };
  document.addEventListener('keydown',go,{once:true});
  canvas.addEventListener('touchstart',go,{once:true,passive:true});
})();

// ── GAME LOOP ─────────────────────────────────────────────────
(function loop() {
  ticker++;
  if (sceneLabel>0) sceneLabel--;

  if (dlgActive) {
    const ed=keys['e']||keys['E']||keys[' '];
    if (ed&&!eDown) advanceDlg();
    eDown=ed;
  } else {
    eDown=false;
    if (scene==='title')        uTitle();
    if (scene==='isle_explore') uExplore();
    if (scene==='tv_shop')      uTvShop();
    if (scene==='bus_lady')     uBusLady();
    if (scene==='street_cross') uStreetCross();
    if (scene==='rat_follow')   uRatFollow();
    if (scene==='pipe_enter')   uPipeEnter();
    if (scene==='continue')     uContinue();
  }

  ctx.clearRect(0,0,800,600);
  ctx.textAlign='left';

  if (scene==='title')        dTitle();
  if (scene==='isle_explore') dExplore();
  if (scene==='tv_shop')      dTvShop();
  if (scene==='bus_lady')     dBusLady();
  if (scene==='street_cross') dStreetCross();
  if (scene==='rat_follow')   dRatFollow();
  if (scene==='pipe_enter')   dPipeEnter();
  if (scene==='continue')     dContinueScreen();

  dDialogue();
  dControls();

  requestAnimationFrame(loop);
})();
</script>
